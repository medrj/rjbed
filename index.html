<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ MED BED MANAGER</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SortableJS for mobile-friendly drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts for Thai Font Selection -->
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;700&family=Chakra+Petch:wght@400;700&family=Kanit:wght@400;700&family=Mitr:wght@400;700&family=Niramit:wght@400;700&family=Pridi:wght@400;700&family=Prompt:wght@400;700&family=Sarabun:wght@400;700&family=Taviraj:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base enlargement to 125% (20px base font) */
        html { font-size: 20px; } 

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #fce7f3 0%, #e0f2fe 50%, #dcfce7 100%);
            min-height: 100vh;
        }
        
        .bed-box { 
            transition: all 0.2s ease; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
            height: 5.5rem; /* FIXED HEIGHT FOR SYMMETRY */
            display: flex;
            flex-direction: column;
            position: relative; 
            overflow: hidden;
        }
        .bed-box:hover { 
            box-shadow: 0 12px 24px -5px rgba(0, 0, 0, 0.12); 
            transform: translateY(-2px); 
        }
        
        /* Medical State Colors */
        .state-reserved { 
            background-color: rgba(248, 113, 113, 0.85);
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.5); 
        }
        .state-reserved .text-input { color: #ffffff; text-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .state-reserved .color-btn { color: #fee2e2; }
        
        .state-vacant { 
            background-color: rgba(134, 239, 172, 0.85);
            color: #064e3b; 
            border: 1px solid rgba(255, 255, 255, 0.5); 
        }
        .state-vacant .text-input { color: #064e3b; }
        .state-vacant .color-btn { color: #166534; }
        
        .state-discharge { 
            background-color: rgba(56, 189, 248, 0.85);
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.5); 
        }
        .state-discharge .text-input { color: #ffffff; text-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .state-discharge .color-btn { color: #e0f2fe; }

        /* Dynamic Text Input: Expanded to full box with padding for multiple icons */
        .text-input {
            width: 100%;
            height: 100%;
            border: 1px dashed transparent; 
            border-radius: 8px;
            padding: 4px 80px 28px 6px; /* PROTECT TEXT FROM 3 BUTTONS */
            opacity: 0.95;
            transition: all 0.2s ease;
            font-size: 0.85rem; 
            font-weight: 700;
            word-break: break-word;
            line-height: 1.1;
            cursor: text;
            overflow-y: auto;
            scrollbar-width: none;
            display: block;
        }
        
        .text-input::-webkit-scrollbar { display: none; }
        
        /* Show border ONLY when hover or focus */
        .text-input:hover, .text-input:focus {
            opacity: 1;
            border: 1px dashed rgba(255, 255, 255, 0.6); 
            outline: none;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        /* Sortable styles */
        .sortable-ghost { opacity: 0.2 !important; }
        .sortable-drag { 
            z-index: 9999 !important;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2) !important;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .bed-box { animation: popIn 0.2s ease-out forwards; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.4); border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="w-full max-w-[2800px] mx-auto">
        
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-3 border-b border-white/40 pb-4">
            <div class="flex flex-col">
                <h1 class="text-3xl font-black text-gray-800 flex items-center gap-3 drop-shadow-sm italic tracking-tighter uppercase">
                    <i class="ph-fill ph-hospital text-blue-600 text-5xl"></i>
                    RJ MED BED MANAGER
                </h1>
                <div class="flex flex-wrap gap-4 mt-2 items-center">
                    <span class="flex items-center gap-2 text-[11px] font-bold text-gray-600 uppercase tracking-tighter"><span class="w-4 h-4 rounded bg-red-400 border border-red-500 shadow-sm"></span> Reserved</span>
                    <span class="flex items-center gap-2 text-[11px] font-bold text-gray-600 uppercase tracking-tighter"><span class="w-4 h-4 rounded bg-green-300 border border-green-500 shadow-sm"></span> Vacant</span>
                    <span class="flex items-center gap-2 text-[11px] font-bold text-gray-600 uppercase tracking-tighter"><span class="w-4 h-4 rounded bg-sky-400 border border-sky-500 shadow-sm"></span> Plan D/C</span>
                    
                    <!-- Font Selection Dropdown -->
                    <div class="flex items-center gap-1.5 border-l-2 border-gray-200/50 pl-4 ml-1">
                        <i class="ph-bold ph-text-aa text-gray-500 text-lg"></i>
                        <select id="font-selector" class="bg-white/50 backdrop-blur-sm border border-gray-200 text-[11px] font-bold text-gray-700 uppercase tracking-tighter rounded px-2 py-1 outline-none cursor-pointer hover:bg-white/80 transition-colors">
                            <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">System Default</option>
                            <option value="'Sarabun', sans-serif">Sarabun (ทางการ)</option>
                            <option value="'Kanit', sans-serif">Kanit (โมเดิร์น)</option>
                            <option value="'Prompt', sans-serif">Prompt (อ่านง่าย)</option>
                            <option value="'Bai Jamjuree', sans-serif">Bai Jamjuree (เหลี่ยม)</option>
                            <option value="'Niramit', sans-serif">Niramit (ร่วมสมัย)</option>
                            <option value="'Chakra Petch', sans-serif">Chakra Petch (เทคโนโลยี)</option>
                            <option value="'Mitr', sans-serif">Mitr (โค้งมน)</option>
                            <option value="'Pridi', serif">Pridi (มีหัว)</option>
                            <option value="'Taviraj', serif">Taviraj (ดั้งเดิม)</option>
                        </select>
                    </div>

                    <!-- Update History Menu -->
                    <button onclick="openHistoryModal()" class="flex items-center gap-1.5 border-l-2 border-gray-200/50 pl-4 hover:text-blue-600 transition-colors text-gray-600 cursor-pointer">
                        <i class="ph-bold ph-clock-counter-clockwise text-xl"></i>
                        <span class="text-[11px] font-bold uppercase tracking-tighter">History</span>
                    </button>
                </div>
            </div>

            <!-- Integrated Time & Status -->
            <div class="bg-white/40 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/60 shadow-inner flex flex-col items-center md:items-end min-w-[300px]">
                <div id="current-time" class="text-4xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-blue-700 via-sky-600 to-cyan-500 font-mono" style="font-variant-numeric: tabular-nums;">
                    --:--:--
                </div>
                <div id="current-date" class="text-[11px] font-bold text-gray-500 tracking-[0.2em] uppercase">
                    ---
                </div>
                
                <div class="flex items-center gap-3 mt-1 pt-1 border-t border-gray-200/50 w-full justify-center md:justify-end">
                    <div class="flex items-center gap-1">
                        <span class="relative flex h-2 w-2">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                        <div id="sync-status" class="text-[10px] font-bold text-emerald-700 uppercase">Connected</div>
                    </div>
                    <div class="text-[9px] text-gray-400 font-mono uppercase tracking-tighter">Live Cloud Logic</div>
                </div>
            </div>
        </div>

        <!-- 2-Column Summary Board -->
        <div class="flex flex-col mb-4 items-stretch gap-3">
            <div id="summary-board-container" class="hidden w-full bg-white/80 backdrop-blur-xl rounded-2xl shadow-md border border-white/90 p-5 relative overflow-hidden">
                <button id="copy-summary-btn" class="absolute top-4 right-4 text-gray-400 hover:text-blue-600 bg-white/60 hover:bg-white rounded-lg p-2 transition-all border border-gray-100 shadow-sm z-10" title="Copy Summary">
                    <i class="ph-bold ph-copy text-2xl"></i>
                </button>
                <div id="summary-content" class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-2 h-auto pr-10"></div>
            </div>

            <!-- Database URL Config -->
            <div id="url-input-container" class="hidden bg-white/60 backdrop-blur-md p-3 rounded-2xl border border-white/80 shadow-sm flex items-center self-end max-w-sm">
                <input type="text" id="api-url" placeholder="Database URL" class="flex-1 text-[11px] border border-gray-300 rounded-l-lg px-3 py-2 focus:outline-none bg-white/80">
                <button onclick="syncData()" class="bg-blue-600 text-white px-4 py-2 rounded-r-lg text-[11px] font-bold">Sync</button>
            </div>
        </div>

        <!-- Ward Filters (Nodes) -->
        <div class="flex flex-wrap gap-2 mb-3" id="ward-filter-container">
            <button onclick="setFilter('All')" id="filter-All" class="filter-btn px-5 py-2 rounded-xl text-sm font-black tracking-widest uppercase transition-all bg-blue-600 text-white shadow-md border border-blue-600">All Wards</button>
            <button onclick="setFilter('ตึกทศมินทร์')" id="filter-ตึกทศมินทร์" class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-widest uppercase transition-all bg-white/60 text-gray-600 hover:bg-white border border-gray-200">ตึกทศมินทร์</button>
            <button onclick="setFilter('ตึกนอก')" id="filter-ตึกนอก" class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-widest uppercase transition-all bg-white/60 text-gray-600 hover:bg-white border border-gray-200">ตึกนอก</button>
            <button onclick="setFilter('ตึก COVID')" id="filter-ตึก COVID" class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-widest uppercase transition-all bg-white/60 text-gray-600 hover:bg-white border border-gray-200">ตึก COVID</button>
        </div>

        <!-- 2-Column Dashboard Container -->
        <div id="dashboard-container" class="grid grid-cols-1 lg:grid-cols-2 gap-4 items-start"></div>

        <button onclick="addWard()" class="mt-6 w-full py-4 border-2 border-dashed border-blue-300 bg-white/30 backdrop-blur-sm rounded-2xl text-blue-600 font-black text-xl hover:bg-white/50 transition-all flex items-center justify-center gap-3 shadow-sm uppercase tracking-widest">
            <i class="ph ph-plus-circle text-3xl"></i> Add New Ward
        </button>

        <!-- Transfer Modal -->
        <div id="transfer-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md z-[9999] hidden items-center justify-center p-4 opacity-0 transition-all duration-300">
            <div class="bg-white border border-white/60 rounded-3xl shadow-2xl w-full max-w-md p-8 transform scale-90 transition-all duration-300" id="transfer-modal-content">
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                    <h3 id="transfer-modal-title" class="text-2xl font-black text-gray-800 flex items-center gap-3 italic uppercase">
                        <i class="ph-bold ph-arrows-left-right text-blue-500 text-4xl"></i> Transfer
                    </h3>
                    <button onclick="closeTransferModal()" class="text-gray-400 bg-gray-100 rounded-full p-2">
                        <i class="ph-bold ph-x"></i>
                    </button>
                </div>
                <div id="transfer-ward-list" class="flex flex-col gap-3 max-h-[55vh] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <!-- History Rollback Modal -->
        <div id="history-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md z-[9999] hidden items-center justify-center p-4 opacity-0 transition-all duration-300">
            <div class="bg-white border border-white/60 rounded-3xl shadow-2xl w-full max-w-md p-8 transform scale-90 transition-all duration-300" id="history-modal-content">
                <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                    <div class="flex items-center gap-4">
                        <h3 class="text-2xl font-black text-gray-800 flex items-center gap-3 italic uppercase">
                            <i class="ph-bold ph-clock-counter-clockwise text-blue-500 text-4xl"></i> Activity History
                        </h3>
                        <button onclick="openCaptchaModal()" class="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1 uppercase tracking-widest" title="Clear All History">
                            <i class="ph-bold ph-trash"></i> Clear
                        </button>
                    </div>
                    <button onclick="closeHistoryModal()" class="text-gray-400 bg-gray-100 rounded-full p-2 hover:bg-gray-200 transition-colors">
                        <i class="ph-bold ph-x"></i>
                    </button>
                </div>
                <p class="text-sm text-gray-500 mb-6 font-bold uppercase tracking-widest italic">Select a previous state to restore (Last 100 Actions)</p>
                <div id="history-list" class="flex flex-col gap-3 max-h-[55vh] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <!-- Captcha Modal for Clearing History -->
        <div id="captcha-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[10000] hidden items-center justify-center p-4 opacity-0 transition-all duration-300">
            <div class="bg-white border border-white/60 rounded-3xl shadow-2xl w-full max-w-sm p-8 transform scale-90 transition-all duration-300" id="captcha-modal-content">
                <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                    <h3 class="text-xl font-black text-red-600 flex items-center gap-2 uppercase tracking-widest">
                        <i class="ph-bold ph-warning"></i> Confirm Clear
                    </h3>
                    <button onclick="closeCaptchaModal()" class="text-gray-400 bg-gray-100 rounded-full p-1.5 hover:bg-gray-200 transition-colors">
                        <i class="ph-bold ph-x"></i>
                    </button>
                </div>
                <p class="text-sm text-gray-600 mb-4 font-bold">To clear all history, please enter the captcha code below:</p>
                <div class="flex justify-center items-center bg-gray-100 rounded-xl p-3 mb-4 select-none">
                    <span id="captcha-code-display" class="text-3xl font-mono font-black text-gray-800 tracking-[0.3em] line-through decoration-gray-400 decoration-2"></span>
                </div>
                <input type="text" id="captcha-input" class="w-full text-center font-mono text-xl border-2 border-gray-200 rounded-xl px-4 py-3 mb-4 focus:border-blue-500 focus:outline-none uppercase" placeholder="Enter code" autocomplete="off" maxlength="4">
                <p id="captcha-error" class="text-red-500 text-xs font-bold text-center mb-4 hidden uppercase tracking-widest">Incorrect code. Try again.</p>
                <div class="flex gap-3">
                    <button onclick="closeCaptchaModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition-colors uppercase tracking-widest">Cancel</button>
                    <button onclick="verifyCaptchaAndClear()" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-colors uppercase tracking-widest shadow-md">Clear History</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const HARDCODED_API_URL = "https://script.google.com/macros/s/AKfycbx_nCLnjyOCgV6SyOMV4C_2CDyaq-LBhRVlUECDP0eL5q8JsuuuhDW2gqLKZsl06ZlC/exec"; 

        function generateId() { return Math.random().toString(36).substr(2, 9); }

        const defaultWards = [
            { id: generateId(), name: "6ก", color: "bg-rose-100 border-rose-300 text-rose-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "6ข", color: "bg-fuchsia-100 border-fuchsia-300 text-fuchsia-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "19B", color: "bg-blue-100 border-blue-300 text-blue-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "20B", color: "bg-cyan-100 border-cyan-300 text-cyan-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "21B", color: "bg-teal-100 border-teal-300 text-teal-900", beds: [], isDefault: true, hasGender: true, lastUpdated: "" },
            { id: generateId(), name: "Observe ward", color: "bg-indigo-100 border-indigo-300 text-indigo-900", beds: [], isDefault: true, hasGender: true, lastUpdated: "" },
            { id: generateId(), name: "ICU", color: "bg-red-100 border-red-300 text-red-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "RCU", color: "bg-orange-100 border-orange-300 text-orange-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "Semi ICU", color: "bg-amber-100 border-amber-300 text-amber-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "PUI", color: "bg-yellow-100 border-yellow-300 text-yellow-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "Cohort", color: "bg-emerald-100 border-emerald-300 text-emerald-900", beds: [], isDefault: true, lastUpdated: "" }
        ];

        let appData = [];
        let sortableInstances = [];
        let historyLog = []; // Stores the state history
        let currentCaptchaCode = ""; // Captcha variable
        let isInteracting = false; 
        let isSaving = false;
        let hasPendingChanges = false; 
        let syncBlockUntil = 0; 
        let saveTimeout; 
        let currentFilter = 'All'; // Filter State

        function getApiUrl() { return HARDCODED_API_URL.trim() !== "" ? HARDCODED_API_URL.trim() : document.getElementById('api-url').value; }

        function cycleState(currentState) {
            if (currentState === 'reserved') return 'vacant';
            if (currentState === 'vacant') return 'discharge';
            return 'reserved';
        }

        function updateWardTimestamp(wardId) {
            const ward = appData.find(w => w.id === wardId);
            if (ward) {
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-GB', { timeZone: 'Asia/Bangkok', day: '2-digit', month: '2-digit', year: '2-digit' });
                const timeStr = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                ward.lastUpdated = `${dateStr} ${timeStr}`;
            }
        }

        // Categorizer function
        function getWardCategory(name) {
            if (!name) return "Other";
            const n = name.toLowerCase();
            if (n.includes('19b') || n.includes('20b') || n.includes('21b') || n.includes('icu') || n.includes('semi')) return "ตึกทศมินทร์";
            if (n.includes('6ก') || n.includes('6ข') || n.includes('observe') || n.includes('er')) return "ตึกนอก";
            if (n.includes('rcu') || n.includes('pui') || n.includes('cohort')) return "ตึก COVID";
            return "Other";
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.id === 'filter-' + filter) {
                    btn.className = "filter-btn px-5 py-2 rounded-xl text-sm font-black tracking-widest uppercase transition-all bg-blue-600 text-white shadow-md border border-blue-600";
                } else {
                    btn.className = "filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-widest uppercase transition-all bg-white/60 text-gray-600 hover:bg-white border border-gray-200";
                }
            });
            renderDashboard();
        }

        function updateSummaryBoard() {
            const summaryContainer = document.getElementById('summary-board-container');
            const summaryContent = document.getElementById('summary-content');
            let htmlContent = '';
            let observeHtmlContent = '';
            let plainTextToCopy = '';
            let observePlainText = '';
            let hasValidData = false;

            appData.forEach(ward => {
                const wName = (ward.name || "").toLowerCase();
                const isObserve = wName.includes("observe");
                const isGendered = wName.includes("observe") || wName.includes("21b");

                let vacant = 0, vacantMale = 0, vacantFemale = 0, reserved = 0, discharge = 0;
                if (ward.beds && ward.beds.length > 0) {
                    ward.beds.forEach(bed => {
                        if (bed.state === 'vacant') {
                            vacant++;
                            if (isGendered) {
                                if (bed.gender === 'female') vacantFemale++;
                                else vacantMale++;
                            }
                        }
                        else if (bed.state === 'reserved') reserved++;
                        else if (bed.state === 'discharge') discharge++;
                    });
                }

                let displayName = ward.name;
                if (wName.includes("semi")) displayName = "Semi";
                if (wName.includes("cohort")) displayName = "Cohort";
                if (wName.includes("observe")) displayName = "Observe";

                let statusChips = [];
                let plainParts = [displayName];

                if (isGendered) {
                    if (vacant === 0) {
                        statusChips.push(`<span class="bg-red-500 text-white font-black px-2.5 py-0.5 rounded text-sm whitespace-nowrap min-w-[50px] text-center shadow-sm uppercase tracking-tighter">เต็ม</span>`);
                        plainParts.push(`เต็ม`);
                    } else {
                        let vacantText = "";
                        if (vacantMale > 0 && vacantFemale > 0) {
                            vacantText = `ว่าง ช ${vacantMale}, ญ ${vacantFemale}`;
                        } else if (vacantMale > 0) {
                            vacantText = `ว่าง ช ${vacantMale}`;
                        } else if (vacantFemale > 0) {
                            vacantText = `ว่าง ญ ${vacantFemale}`;
                        }
                        
                        statusChips.push(`<span class="bg-emerald-100 text-emerald-800 font-bold px-2 py-0.5 rounded text-sm whitespace-nowrap min-w-[50px] text-center border border-emerald-200">${vacantText}</span>`);
                        plainParts.push(vacantText);
                    }
                } else {
                    if (vacant === 0) {
                        statusChips.push(`<span class="bg-red-500 text-white font-black px-2.5 py-0.5 rounded text-sm whitespace-nowrap min-w-[50px] text-center shadow-sm uppercase tracking-tighter">เต็ม</span>`);
                        plainParts.push(`เต็ม`);
                    } else {
                        statusChips.push(`<span class="bg-emerald-100 text-emerald-800 font-bold px-2 py-0.5 rounded text-sm whitespace-nowrap min-w-[50px] text-center border border-emerald-200">ว่าง ${vacant}</span>`);
                        plainParts.push(`ว่าง ${vacant}`);
                    }
                }

                if (reserved > 0) {
                    statusChips.push(`<span class="bg-rose-100 text-rose-800 font-bold px-2 py-0.5 rounded text-sm whitespace-nowrap min-w-[70px] text-center border border-rose-200">จองมาแล้ว ${reserved}</span>`);
                    plainParts.push(`จองมาแล้ว ${reserved}`);
                }
                if (discharge > 0) {
                    statusChips.push(`<span class="bg-sky-100 text-sky-800 font-bold px-2 py-0.5 rounded text-sm whitespace-nowrap min-w-[80px] text-center border border-sky-200">Plan D/C ${discharge}</span>`);
                    plainParts.push(`Plan D/C ${discharge}`);
                }

                let rowHtml = `
                    <div class="flex items-center gap-3 py-2 border-b border-gray-100 last:border-0 overflow-hidden">

        function createBedElement(ward, bed) {
            const bedDiv = document.createElement('div');
            bedDiv.className = `bed-box state-${bed.state} rounded-2xl p-0 cursor-grab relative shadow-sm block`;
            bedDiv.dataset.bedId = bed.id;
            
            let isLongPressing = false, pressTimer, startX, startY;

            const startPress = (e) => {
                if (e.target.closest('button')) return; 
                if (e.type === 'mousedown' && e.button !== 0) return; 
                const touch = e.touches ? e.touches[0] : e;
                startX = touch.clientX; startY = touch.clientY;
                isLongPressing = false;
                pressTimer = setTimeout(() => {
                    if (bedDiv.classList.contains('sortable-drag')) return;
                    isLongPressing = true;
                    if (navigator.vibrate) navigator.vibrate(20); 
                    openTransferModal(bed.id, ward.id);
                }, 400); 
            };
            
            const cancelPress = () => clearTimeout(pressTimer);
            const checkMovement = (e) => {
                if (!pressTimer) return;
                const touch = e.touches ? e.touches[0] : e;
                if (Math.abs(touch.clientX - startX) > 5 || Math.abs(touch.clientY - startY) > 5) cancelPress();
            };

            bedDiv.addEventListener('touchstart', startPress, {passive: true});
            bedDiv.addEventListener('touchend', cancelPress);
            bedDiv.addEventListener('touchmove', checkMovement, {passive: true});
            bedDiv.addEventListener('mousedown', startPress);
            bedDiv.addEventListener('mouseup', cancelPress);
            bedDiv.addEventListener('mousemove', checkMovement);

            const textDiv = document.createElement('div');
            textDiv.className = "text-input font-black leading-tight cursor-text";
            textDiv.contentEditable = "false"; textDiv.innerText = bed.text || "";
            textDiv.onclick = (e) => {
                if (isLongPressing) { e.preventDefault(); return; }
                if (textDiv.contentEditable !== "true") {
                    textDiv.contentEditable = "true"; textDiv.focus();
                    if (textDiv.innerText.length > 0) {
                        const r = document.createRange(), s = window.getSelection();
                        r.selectNodeContents(textDiv); r.collapse(false); s.removeAllRanges(); s.addRange(r);
                    }
                }
            };
            textDiv.onfocus = () => { isInteracting = true; };
            textDiv.onblur = (e) => { 
                textDiv.contentEditable = "false"; isInteracting = false; 
                if (bed.text !== e.target.innerText) {
                    updateWardTimestamp(ward.id);
                    updateBedText(bed.id, e.target.innerText); 
                }
            };

            const preventDrag = (e) => { if (textDiv.contentEditable === "true") e.stopPropagation(); };
            textDiv.onmousedown = preventDrag; textDiv.ontouchstart = preventDrag;

            const colorBtn = document.createElement('button');
            colorBtn.className = "color-btn absolute top-1 right-1 text-2xl hover:scale-125 transition-transform z-10 drop-shadow-md";
            colorBtn.innerHTML = '<i class="ph-fill ph-drop"></i>';
            colorBtn.onclick = (e) => { 
                e.preventDefault(); e.stopPropagation(); updateWardTimestamp(ward.id); toggleBedState(bed.id); 
            };

            const transBtn = document.createElement('button');
            transBtn.className = "absolute bottom-1 right-8 text-base opacity-20 hover:opacity-100 z-10 p-0.5";
            transBtn.innerHTML = '<i class="ph ph-arrows-left-right"></i>';
            transBtn.onclick = (e) => { 
                e.preventDefault(); e.stopPropagation(); openTransferModal(bed.id, ward.id); 
            };

            if (ward.hasGender) {
                const gBtn = document.createElement('button');
                gBtn.className = "gender-btn absolute bottom-1 left-1.5 hover:scale-125 transition-transform z-10";
                if (!bed.gender) bed.gender = 'male'; 
                gBtn.innerHTML = bed.gender === 'male' ? '<i class="ph-bold ph-gender-male text-blue-600 drop-shadow-md text-3xl"></i>' : '<i class="ph-bold ph-gender-female text-pink-600 drop-shadow-md text-3xl"></i>';
                gBtn.onclick = (e) => { 
                    e.preventDefault(); e.stopPropagation(); updateWardTimestamp(ward.id); toggleBedGender(bed.id); 
                };
                bedDiv.appendChild(gBtn);
            }

            const delBtn = document.createElement('button');
            delBtn.className = "absolute bottom-1 right-1 text-base opacity-20 hover:opacity-100 z-10 p-0.5";
            delBtn.innerHTML = '<i class="ph ph-trash"></i>'; 
            delBtn.onclick = (e) => { 
                e.preventDefault(); e.stopPropagation(); updateWardTimestamp(ward.id); deleteBed(bed.id); 
            };

            bedDiv.appendChild(textDiv); bedDiv.appendChild(colorBtn); bedDiv.appendChild(transBtn); bedDiv.appendChild(delBtn);
            return bedDiv;
        }

        let tBedId = null, tFromId = null, tTargetId = null;

        function openTransferModal(bedId, currentWardId) {

        function showVacantBedsForTransfer(targetId) {
            tTargetId = targetId; const targetWard = appData.find(w => w.id === targetId);
            const list = document.getElementById('transfer-ward-list'); list.innerHTML = '';
            document.getElementById('transfer-modal-title').innerHTML = `<div class="flex items-center gap-2 text-xl"><button onclick="renderWardListForTransfer()" class="hover:bg-gray-100 p-2 rounded-full"><i class="ph-bold ph-arrow-left text-gray-400"></i></button> Select Bed</div>`;
            
            let count = 1;
            targetWard.beds.forEach((bed) => {

                    const label = bed.text && bed.text.trim() !== "" ? bed.text : `Vacant ${count}`;

                    btn.className = `w-full text-left px-5 py-4 rounded-2xl border border-emerald-100 bg-emerald-50/50 hover:bg-emerald-100 transition-all flex items-center justify-between mb-2 shadow-sm`;
                    btn.innerHTML = `<div class="flex items-center gap-3"><span class="w-6 h-6 rounded-full bg-emerald-400 border-2 border-white shadow-sm inline-block"></span><span class="font-black text-emerald-800 text-lg italic">${label}</span></div><i class="ph-bold ph-check text-emerald-600 opacity-0 group-hover:opacity-100 text-3xl"></i>`;
                    btn.onclick = () => executeTransfer(bed.id);

        function executeTransfer(targetBedId) {
            const fromWard = appData.find(w => w.id === tFromId), toWard = appData.find(w => w.id === tTargetId);
            if (fromWard && toWard) {
                const sBed = fromWard.beds.find(b => b.id === tBedId), tBed = toWard.beds.find(b => b.id === targetBedId);
                if (sBed && tBed) {
                    tBed.text = sBed.text; tBed.state = sBed.state; tBed.gender = toWard.hasGender ? (sBed.gender || 'male') : undefined;
                    sBed.text = ""; sBed.state = "vacant"; sBed.gender = fromWard.hasGender ? 'male' : undefined;
                    updateWardTimestamp(tFromId); updateWardTimestamp(tTargetId);
                    renderDashboard(); autoSave(`Transferred patient from ${fromWard.name} to ${toWard.name}`);
                }
            }
            closeTransferModal();
        }

        function closeTransferModal() {
            const modal = document.getElementById('transfer-modal'), content = document.getElementById('transfer-modal-content');
            modal.classList.remove('opacity-100'); content.classList.remove('scale-100'); content.classList.add('scale-90');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); tBedId = null; tFromId = null; tTargetId = null; }, 300);
        }

        // --- Data Packaging Logic ---
        // Reads raw data array and extracts SYSTEM_HISTORY if present
        function extractHistoryAndData(rawData) {
            let data = [];
            let history = [];
            
            if (Array.isArray(rawData)) {
                data = [...rawData]; 
            } else if (rawData && rawData.data) {
                data = [...rawData.data];
                history = rawData.history || [];
            }

            // Find SYSTEM_HISTORY node that was packed inside the array
            const histIdx = data.findIndex(w => w.id === "SYSTEM_HISTORY");
            if (histIdx !== -1) {
                history = data[histIdx].log || [];
                data.splice(histIdx, 1); // Remove from rendering list
            }
            
            return { data: applyDefaultFlags(data), history: history };
        }

        // Pack appData and historyLog into ONE array for safe Cloud Saving
        function getPayloadForSaving() {
            // Keep history limit to 100 since the backend now supports chunking
            if (historyLog.length > 100) historyLog = historyLog.slice(0, 100);
            
            const payload = [...appData]; 
            payload.push({
                id: "SYSTEM_HISTORY",
                log: historyLog,
                beds: [] 
            });
            return payload;
        }

        // --- History & Rollback Logic ---
        function saveToHistory(actionDesc = "System Update") {
            const currentState = JSON.stringify(appData);
            if (historyLog.length === 0 || historyLog[0].data !== currentState) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const dateStr = now.toLocaleDateString('en-GB', { timeZone: 'Asia/Bangkok', day: '2-digit', month: '2-digit', year: 'numeric' });
                historyLog.unshift({ time: timeStr, dateStr: `${dateStr}, ${timeStr}`, action: actionDesc, data: currentState });
                
                // Allow exactly 100 histories to be stored
                if (historyLog.length > 100) {
                    historyLog = historyLog.slice(0, 100);
                }
            }
        }

        function openHistoryModal() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            if (historyLog.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 font-bold p-6 italic uppercase tracking-widest">No history available</div>`;
            } else {
                historyLog.forEach((entry, index) => {
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left px-5 py-4 rounded-2xl border transition-all flex items-center justify-between group border-gray-100 bg-gray-50 hover:bg-blue-50 shadow-sm mb-2`;
                    btn.innerHTML = `
                        <div class="flex items-center gap-4">
                            <i class="ph-bold ph-clock text-gray-400 group-hover:text-blue-500 text-3xl"></i>
                            <div class="flex flex-col">
                                <div class="flex items-center gap-3">
                                    <span class="font-black text-gray-700 text-xl tracking-widest">${entry.time}</span>
                                    ${index === 0 ? '<span class="text-[10px] bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-black uppercase tracking-widest">Current State</span>' : ''}
                                </div>
                                <span class="text-sm font-bold text-gray-500 mt-1">${entry.action}</span>
                            </div>
                        </div>
                        <span class="text-sm font-black text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-widest">Restore</span>
                    `;
                    btn.onclick = () => rollbackTo(index);
                    list.appendChild(btn);
                });
            }
            
            const modal = document.getElementById('history-modal'), content = document.getElementById('history-modal-content');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.add('opacity-100'); content.classList.remove('scale-90'); content.classList.add('scale-100'); }, 10);
        }

        function closeHistoryModal() {
            const modal = document.getElementById('history-modal'), content = document.getElementById('history-modal-content');
            modal.classList.remove('opacity-100'); content.classList.remove('scale-100'); content.classList.add('scale-90');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }

        // --- Captcha Logic for Clearing History ---
        function generateCaptcha() {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let code = '';
            for(let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function openCaptchaModal() {
            if (historyLog.length === 0) return; 
            currentCaptchaCode = generateCaptcha();
            document.getElementById('captcha-code-display').innerText = currentCaptchaCode;
            document.getElementById('captcha-input').value = '';
            document.getElementById('captcha-error').classList.add('hidden');
            
            const modal = document.getElementById('captcha-modal'), content = document.getElementById('captcha-modal-content');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { 
                modal.classList.add('opacity-100'); 
                content.classList.remove('scale-90'); 
                content.classList.add('scale-100');
                document.getElementById('captcha-input').focus();
            }, 10);
        }

        function closeCaptchaModal() {
            const modal = document.getElementById('captcha-modal'), content = document.getElementById('captcha-modal-content');
            modal.classList.remove('opacity-100'); content.classList.remove('scale-100'); content.classList.add('scale-90');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }

        function verifyCaptchaAndClear() {
            const input = document.getElementById('captcha-input').value.toUpperCase();
            if (input === currentCaptchaCode) {
                historyLog = [];
                saveToHistory("History Cleared"); 
                autoSave("History Cleared");
                closeCaptchaModal();
                openHistoryModal(); 
            } else {
                document.getElementById('captcha-error').classList.remove('hidden');
                document.getElementById('captcha-input').value = '';
                document.getElementById('captcha-input').focus();
                currentCaptchaCode = generateCaptcha();
                document.getElementById('captcha-code-display').innerText = currentCaptchaCode;
            }
        }

        function rollbackTo(index) {
            if(confirm(`Are you sure you want to revert all data to the state at ${historyLog[index].time}?`)) {
                appData = JSON.parse(historyLog[index].data);
                renderDashboard();
                autoSave(`Restored history to ${historyLog[index].time}`); 
                closeHistoryModal();
            }
        }

        // --- Core Operations ---
        function forceUpdateWardTime(wardId) {
            const w = appData.find(w => w.id === wardId);
            updateWardTimestamp(wardId);
            renderDashboard();
            autoSave(`Confirmed update time for ${w ? w.name : 'Ward'}`);
        }

        function toggleBedState(bedId) {
            const info = findBedInfo(bedId); if (!info) return;
            info.bed.state = cycleState(info.bed.state);
            renderDashboard(); autoSave(`Changed status to ${info.bed.state.toUpperCase()} in ${info.ward.name}`);
        }
        function toggleBedGender(bedId) {
            const info = findBedInfo(bedId); if (!info) return;
            info.bed.gender = (info.bed.gender === 'female') ? 'male' : 'female';
            renderDashboard(); autoSave(`Changed gender to ${info.bed.gender.toUpperCase()} in ${info.ward.name}`);
        }
        function updateBedText(bedId, text) {
            const info = findBedInfo(bedId); if (info) { info.bed.text = text; autoSave(`Updated patient info in ${info.ward.name}`); }
        }
        function updateWardName(wardId, name) {
            const ward = appData.find(w => w.id === wardId);
            if (ward && ward.name !== name) { ward.name = name; renderDashboard(); autoSave(`Renamed ward to ${name}`); }
        }
        function addBed(wardId) {
            const ward = appData.find(w => w.id === wardId); if (!ward) return;
            if (!ward.beds) ward.beds = [];
            ward.beds.push({ id: generateId(), text: "", state: "vacant", gender: ward.hasGender ? "male" : undefined });
            updateWardTimestamp(wardId); renderDashboard(); autoSave(`Added a new bed to ${ward.name}`);
        }
        function deleteBed(bedId) {
            const info = findBedInfo(bedId); if (!info) return;
            info.ward.beds.splice(info.bedIndex, 1);
            updateWardTimestamp(info.ward.id); renderDashboard(); autoSave(`Removed a bed from ${info.ward.name}`);
        }
        function addWard() {
            const colors = ["bg-rose-100 border-rose-300 text-rose-900", "bg-sky-100 border-sky-300 text-sky-900", "bg-emerald-100 border-emerald-300 text-emerald-900"];
            appData.push({ id: generateId(), name: "NEW WARD", color: colors[Math.floor(Math.random() * colors.length)], beds: [], isDefault: false, lastUpdated: "" });
            renderDashboard(); autoSave(`Created a new ward`);
        }
        function deleteWard(wardId) {
            const ward = appData.find(w => w.id === wardId);
            if (ward && ward.isDefault) { alert("Core wards cannot be removed."); return; }
            if (confirm("Remove ward?")) { appData = appData.filter(w => w.id !== wardId); renderDashboard(); autoSave(`Deleted ward ${ward.name}`); }
        }
        function findBedInfo(bedId) {
            for (let i = 0; i < appData.length; i++) {
                if (!appData[i].beds) continue;
                const idx = appData[i].beds.findIndex(b => b.id === bedId);
                if (idx !== -1) return { ward: appData[i], bed: appData[i].beds[idx], bedIndex: idx };
            }
            return null;
        }
        function handleDragEnd(evt) {
            const fromWard = appData.find(w => w.id === evt.from.dataset.wardId), toWard = appData.find(w => w.id === evt.to.dataset.wardId);
            if (fromWard && toWard) {
                const [moved] = fromWard.beds.splice(evt.oldIndex, 1);
                if (toWard.hasGender && !moved.gender) moved.gender = 'male';
                toWard.beds.splice(evt.newIndex, 0, moved);
                updateWardTimestamp(fromWard.id); updateWardTimestamp(toWard.id);
                renderDashboard(); 
                if (fromWard.id === toWard.id) autoSave(`Reordered beds in ${fromWard.name}`);
                else autoSave(`Moved bed from ${fromWard.name} to ${toWard.name}`);
            }
        }

        // --- Data Persistence ---
        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB', { timeZone: 'Asia/Bangkok', day: '2-digit', month: 'short', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            if(document.getElementById('current-date')) document.getElementById('current-date').innerText = dateStr;
            if(document.getElementById('current-time')) document.getElementById('current-time').innerText = timeStr;
        }
        setInterval(updateClock, 1000); 

        function applyDefaultFlags(data) {
            if (!Array.isArray(data)) return [];
            const originals = ["6ก", "6ข", "19B", "20B", "21B", "Observe ward", "ICU", "RCU", "Semi ICU", "PUI", "Cohort"];
            data.forEach(ward => {
                if (ward.isDefault === undefined && originals.includes(ward.name)) ward.isDefault = true;
                const n = (ward.name || "").toLowerCase();
                if (n.includes("observe") || n.includes("21b")) ward.hasGender = true;
                if (!ward.beds) ward.beds = [];
            });
            return data;
        }

        function autoSave(actionDesc = "Auto Saved") {
            hasPendingChanges = true; const url = getApiUrl();
            
            saveToHistory(actionDesc);
            
            const payloadArray = getPayloadForSaving();
            localStorage.setItem('er_dashboard_data', JSON.stringify(payloadArray));
            
            if (!url) { hasPendingChanges = false; return; }
            clearTimeout(saveTimeout);
            document.getElementById('sync-status').innerText = "UPDATING...";
            
            saveTimeout = setTimeout(() => saveToCloud(url, payloadArray), 1500); 
        }

        async function saveToCloud(url, payloadArray) {
            hasPendingChanges = false; isSaving = true; 
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payloadArray) });
                if (res.ok) {
                    document.getElementById('sync-status').innerHTML = 'Synced';
                    syncBlockUntil = Date.now() + 8000; 
                }
            } catch (e) {} finally { isSaving = false; }
        }

        async function backgroundSync() {
            const url = getApiUrl();
            if (!url || isInteracting || isSaving || hasPendingChanges || Date.now() < syncBlockUntil) return;
            try {
                const res = await fetch(url);
                const rawData = await res.json();
                if (isInteracting || isSaving || hasPendingChanges) return; 
                
                const extracted = extractHistoryAndData(rawData);

                if (JSON.stringify(extracted.data) !== JSON.stringify(appData)) {
                    appData = extracted.data;
                    historyLog = extracted.history;
                    saveToHistory("Cloud Sync Updated Data"); 
                    renderDashboard();
                }
            } catch (e) {}
        }
        setInterval(backgroundSync, 3000);

        async function syncData() {
            const url = getApiUrl();
            if (!url) return;
            try {
                const res = await fetch(url);
                const rawData = await res.json();
                
                const extracted = extractHistoryAndData(rawData);
                
                if (extracted.data && extracted.data.length > 0) {
                    appData = extracted.data;
                    historyLog = extracted.history;
                    saveToHistory("Initial Cloud Load");
                } else {
                    appData = JSON.parse(JSON.stringify(defaultWards));
                    saveToHistory("Initialized Empty Wards");
                }
                renderDashboard();
            } catch (e) { loadLocalData(); }
        }

        function loadLocalData() {
            const local = localStorage.getItem('er_dashboard_data');
            if (local) {
                const extracted = extractHistoryAndData(JSON.parse(local));
                appData = extracted.data;
                historyLog = extracted.history;
                saveToHistory("Loaded Local Data");
            } else {
                appData = JSON.parse(JSON.stringify(defaultWards));
                saveToHistory("Loaded Local Data");
            }
            renderDashboard();
        }

        window.onload = () => {
            updateClock();
            
            // Initialize Font Selection
            const fontSelector = document.getElementById('font-selector');
            const savedFont = localStorage.getItem('er_dashboard_font');
            if (savedFont && fontSelector) {
                document.body.style.fontFamily = savedFont;
                fontSelector.value = savedFont;
            }
            if (fontSelector) {
                fontSelector.addEventListener('change', (e) => {
                    document.body.style.fontFamily = e.target.value;
                    localStorage.setItem('er_dashboard_font', e.target.value);
                });
            }

            if (HARDCODED_API_URL.trim() !== "") {
                if (document.getElementById('url-input-container')) document.getElementById('url-input-container').style.display = 'none';
                syncData(); 
            } else {
                if (document.getElementById('url-input-container')) document.getElementById('url-input-container').classList.remove('hidden');
                const saved = localStorage.getItem('er_dashboard_url');
                if (saved && document.getElementById('api-url')) { document.getElementById('api-url').value = saved; syncData(); }
                else loadLocalData();
            }
        };
    </script>
</body>
</html>

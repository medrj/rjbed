<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RJ MED BED MANAGER</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;700&family=Chakra+Petch:wght@400;700&family=Kanit:wght@400;700&family=Mitr:wght@400;700&family=Niramit:wght@400;700&family=Pridi:wght@400;700&family=Prompt:wght@400;700&family=Sarabun:wght@400;700&family=Taviraj:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base font enlargement (20px) */
        html { font-size: 20px; } 

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(125deg, #fce7f3 0%, #e0f2fe 35%, #dcfce7 70%, #fef3c7 100%);
            background-size: 400% 400%;
            animation: breathe-bg 15s ease infinite alternate;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes breathe-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* WOW Factor for Summary Board */
        .wow-summary-wrapper {
            position: relative;
            border-radius: 1.5rem;
            padding: 3px; 
            background: linear-gradient(270deg, #3b82f6, #06b6d4, #10b981, #3b82f6);
            background-size: 300% 300%;
            animation: animated-gradient 5s ease infinite alternate;
            box-shadow: 0 10px 40px -10px rgba(6, 182, 212, 0.5);
            z-index: 1;
        }
        @keyframes animated-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .wow-summary-inner {
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: calc(1.5rem - 3px);
            height: 100%;
            width: 100%;
            z-index: 2;
        }

        .ward-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ward-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
        }
        
        /* Bed Box Styling */
        .bed-box { 
            transition: all 0.2s ease; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
            height: 5.5rem; 
            display: flex;
            flex-direction: column;
            position: relative; 
            overflow: hidden;
        }
        .bed-box:hover { 
            box-shadow: 0 12px 24px -5px rgba(0, 0, 0, 0.12); 
            transform: translateY(-2px); 
        }
        
        /* States */
        .state-reserved { background-color: rgba(248, 113, 113, 0.88); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.5); }
        .state-vacant { background-color: rgba(134, 239, 172, 0.88); color: #064e3b; border: 1px solid rgba(255, 255, 255, 0.5); }
        .state-discharge { background-color: rgba(56, 189, 248, 0.88); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.5); }

        /* Dynamic Text Input with fixed alignment */
        .text-input {
            width: 100%;
            height: 100%;
            border: 1px dashed transparent; 
            border-radius: 8px;
            padding: 10px 85px 32px 12px; 
            opacity: 0.95;
            transition: all 0.2s ease;
            font-size: 0.85rem; 
            font-weight: 700;
            word-break: break-word;
            line-height: 1.2;
            cursor: text;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            align-items: flex-start;
        }
        .text-input::-webkit-scrollbar { display: none; }
        .text-input:hover, .text-input:focus {
            opacity: 1;
            border: 1px dashed rgba(255, 255, 255, 0.6); 
            outline: none;
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        /* Sortable */
        .sortable-ghost { opacity: 0.2 !important; }
        .sortable-drag { 
            z-index: 9999 !important;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.25) !important;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .bed-box { animation: popIn 0.2s ease-out forwards; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.4); border-radius: 10px; }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            html { font-size: 16px; }
            .wow-summary-inner { padding: 1rem !important; }
            #current-time { font-size: 3.5rem !important; }
            .bed-box { height: 6.5rem; } /* Slightly taller for thumbs */
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="w-full max-w-[2800px] mx-auto">
        
        <!-- Header Section -->
        <div class="flex flex-col xl:flex-row justify-between items-center mb-6 gap-6 border-b border-white/40 pb-6">
            <div class="flex flex-col w-full xl:w-auto">
                <h1 class="text-3xl md:text-4xl font-black text-gray-800 flex items-center gap-3 drop-shadow-sm italic tracking-tighter uppercase">
                    <i class="ph-fill ph-hospital text-blue-600 text-5xl md:text-6xl drop-shadow-md"></i>
                    RJ MED BED MANAGER
                </h1>
                <div class="flex flex-wrap gap-3 mt-4 items-center">
                    <span class="flex items-center gap-2 text-[10px] md:text-[12px] font-bold text-gray-600 uppercase tracking-tighter"><span class="w-4 h-4 rounded bg-red-400 border border-red-500 shadow-sm"></span> Reserved</span>
                    <span class="flex items-center gap-2 text-[10px] md:text-[12px] font-bold text-gray-600 uppercase tracking-tighter"><span class="w-4 h-4 rounded bg-green-300 border border-green-500 shadow-sm"></span> Vacant</span>
                    <span class="flex items-center gap-2 text-[10px] md:text-[12px] font-bold text-gray-600 uppercase tracking-tighter"><span class="w-4 h-4 rounded bg-sky-400 border border-sky-500 shadow-sm"></span> Plan D/C</span>
                    
                    <div class="flex items-center gap-1.5 border-l-2 border-gray-200/50 pl-3 ml-1">
                        <i class="ph-bold ph-text-aa text-gray-500 text-lg"></i>
                        <select id="font-selector" class="bg-white/60 backdrop-blur-sm border border-gray-200 text-[10px] font-bold text-gray-700 uppercase tracking-tighter rounded px-2 py-1 outline-none cursor-pointer">
                            <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">System Default</option>
                            <option value="'Sarabun', sans-serif">Sarabun (ทางการ)</option>
                            <option value="'Kanit', sans-serif">Kanit (โมเดิร์น)</option>
                            <option value="'Prompt', sans-serif">Prompt (อ่านง่าย)</option>
                            <option value="'Bai Jamjuree', sans-serif">Bai Jamjuree (เหลี่ยม)</option>
                            <option value="'Niramit', sans-serif">Niramit (ร่วมสมัย)</option>
                            <option value="'Chakra Petch', sans-serif">Chakra Petch (เทคโนโลยี)</option>
                            <option value="'Mitr', sans-serif">Mitr (โค้งมน)</option>
                            <option value="'Pridi', serif">Pridi (มีหัว)</option>
                            <option value="'Taviraj', serif">Taviraj (ดั้งเดิม)</option>
                        </select>
                    </div>

                    <button onclick="openHistoryModal()" class="flex items-center gap-1.5 border-l-2 border-gray-200/50 pl-3 hover:text-blue-600 text-gray-600">
                        <i class="ph-bold ph-clock-counter-clockwise text-xl"></i>
                        <span class="text-[10px] font-bold uppercase tracking-tighter">History</span>
                    </button>
                </div>
            </div>

            <!-- Time & Status Module (Responsive WOW) -->
            <div class="relative group w-full xl:w-auto">
                <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 via-sky-400 to-indigo-600 rounded-[1.8rem] blur-md opacity-30 group-hover:opacity-50 transition duration-1000 animate-pulse"></div>
                <div class="relative bg-white/80 backdrop-blur-2xl px-6 md:px-10 py-5 rounded-[1.8rem] border border-white/60 shadow-2xl flex flex-col items-center md:items-end">
                    <div id="current-time" class="text-5xl md:text-7xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-br from-blue-900 via-blue-700 to-cyan-600 font-mono drop-shadow-md" style="font-variant-numeric: tabular-nums;">--:--:--</div>
                    <div id="current-date" class="text-sm md:text-lg font-bold text-gray-500 tracking-[0.3em] uppercase mt-1 opacity-80">---</div>
                    <div class="flex items-center gap-4 mt-4 pt-4 border-t border-gray-200/60 w-full justify-center md:justify-end">
                        <div class="flex items-center gap-2 bg-emerald-50 px-4 py-1.5 rounded-full border border-emerald-100 shadow-sm transition-all hover:bg-emerald-100">
                            <span class="relative flex h-3 w-3">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                            </span>
                            <div id="sync-status" class="text-[11px] font-black text-emerald-800 uppercase tracking-widest">CONNECTED</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- WOW Summary Board -->
        <div class="flex flex-col mb-8 items-stretch gap-3">
            <div id="summary-board-wrapper" class="hidden w-full wow-summary-wrapper">
                <div id="summary-board-container" class="wow-summary-inner p-5 md:p-8 relative overflow-hidden">
                    <button id="copy-summary-btn" class="absolute top-4 right-4 md:top-6 md:right-6 text-gray-400 hover:text-blue-600 bg-white/70 rounded-lg p-2 transition-all border border-gray-100 shadow-sm z-10">
                        <i class="ph-bold ph-copy text-2xl"></i>
                    </button>
                    <div id="summary-content" class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-3 h-auto pr-10"></div>
                </div>
            </div>

            <div id="url-input-container" class="hidden bg-white/40 backdrop-blur-md rounded-2xl border border-white/60 p-3 self-end w-full max-w-sm">
                <div class="flex items-center">
                    <input type="text" id="api-url" placeholder="Database URL" class="flex-1 text-[11px] border border-gray-300 rounded-l-lg px-3 py-2 outline-none">
                    <button onclick="syncData()" class="bg-blue-600 text-white px-4 py-2 rounded-r-lg text-[11px] font-bold">Sync</button>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-2 md:gap-3 mb-6" id="ward-filter-container">
            <button onclick="setFilter('All')" id="filter-All" class="filter-btn flex-1 md:flex-none px-4 md:px-6 py-3 rounded-2xl text-[11px] md:text-sm font-black tracking-widest uppercase transition-all bg-blue-600 text-white shadow-lg border border-blue-600">All</button>
            <button onclick="setFilter('ตึกทศมินทร์')" id="filter-ตึกทศมินทร์" class="filter-btn flex-1 md:flex-none px-4 md:px-6 py-3 rounded-2xl text-[11px] md:text-sm font-bold tracking-widest uppercase transition-all bg-white/70 text-gray-600 hover:bg-white border border-gray-200">ทศมินทร์</button>
            <button onclick="setFilter('ตึกนอก')" id="filter-ตึกนอก" class="filter-btn flex-1 md:flex-none px-4 md:px-6 py-3 rounded-2xl text-[11px] md:text-sm font-bold tracking-widest uppercase transition-all bg-white/70 text-gray-600 hover:bg-white border border-gray-200">ตึกนอก</button>
            <button onclick="setFilter('ตึก COVID')" id="filter-ตึก COVID" class="filter-btn flex-1 md:flex-none px-4 md:px-6 py-3 rounded-2xl text-[11px] md:text-sm font-bold tracking-widest uppercase transition-all bg-white/70 text-gray-600 hover:bg-white border border-gray-200">COVID</button>
        </div>

        <!-- Grid -->
        <div id="dashboard-container" class="grid grid-cols-1 lg:grid-cols-2 gap-5 md:gap-6 items-start pb-10"></div>

        <button onclick="openAddWardModal()" class="mb-10 w-full py-5 border-2 border-dashed border-blue-300 bg-white/40 rounded-[1.8rem] text-blue-600 font-black text-xl hover:bg-white/70 transition-all flex items-center justify-center gap-3">
            <i class="ph ph-plus-circle text-3xl"></i> ADD NEW WARD
        </button>

        <!-- New Ward Modal -->
        <div id="add-ward-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[10000] hidden items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8" id="add-ward-modal-content">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h3 class="text-xl font-black text-blue-600 uppercase italic">New Ward</h3>
                    <button onclick="closeAddWardModal()"><i class="ph-bold ph-x text-2xl text-gray-400"></i></button>
                </div>
                <input type="text" id="new-ward-name" class="w-full text-center font-black text-2xl border-2 border-gray-200 rounded-2xl px-4 py-4 mb-6 focus:border-blue-500 outline-none uppercase italic" placeholder="Name">
                <div class="flex gap-3">
                    <button onclick="closeAddWardModal()" class="flex-1 py-3 bg-gray-100 font-bold rounded-xl">Cancel</button>
                    <button onclick="confirmAddWard()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md">Create</button>
                </div>
            </div>
        </div>

        <!-- Transfer Modal -->
        <div id="transfer-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md z-[9999] hidden items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 md:p-8" id="transfer-modal-content">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h3 id="transfer-modal-title" class="text-2xl font-black text-gray-800 uppercase italic">Transfer</h3>
                    <button onclick="closeTransferModal()"><i class="ph-bold ph-x text-2xl text-gray-400"></i></button>
                </div>
                <div id="transfer-ward-list" class="flex flex-col gap-3 max-h-[50vh] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <!-- History Modal -->
        <div id="history-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md z-[9999] hidden items-center justify-center p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 md:p-8" id="history-modal-content">
                <div class="flex justify-between items-center mb-4 border-b pb-4">
                    <div class="flex items-center gap-3">
                        <h3 class="text-2xl font-black text-gray-800 uppercase italic">History</h3>
                        <button onclick="openCaptchaModal()" class="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded">CLEAR</button>
                    </div>
                    <button onclick="closeHistoryModal()"><i class="ph-bold ph-x text-2xl text-gray-400"></i></button>
                </div>
                <div id="history-list" class="flex flex-col gap-3 max-h-[55vh] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <!-- Captcha Modal -->
        <div id="captcha-modal" class="fixed inset-0 bg-slate-900/60 z-[10000] hidden items-center justify-center p-4">
            <div class="bg-white rounded-3xl w-full max-w-xs p-8 shadow-2xl" id="captcha-modal-content">
                <h3 class="text-lg font-black text-red-600 uppercase mb-4">Confirm Clear</h3>
                <div class="bg-gray-100 rounded-xl p-4 mb-4 text-3xl font-mono font-black text-center tracking-widest line-through" id="captcha-code-display"></div>
                <input type="text" id="captcha-input" class="w-full text-center text-xl border-2 border-gray-200 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500 uppercase" placeholder="Enter code">
                <div class="flex gap-3">
                    <button onclick="closeCaptchaModal()" class="flex-1 py-3 font-bold">Cancel</button>
                    <button onclick="verifyCaptchaAndClear()" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const HARDCODED_API_URL = "https://script.google.com/macros/s/AKfycbx_nCLnjyOCgV6SyOMV4C_2CDyaq-LBhRVlUECDP0eL5q8JsuuuhDW2gqLKZsl06ZlC/exec"; 

        function generateId() { return Math.random().toString(36).substr(2, 9); }

        const defaultWards = [
            { id: generateId(), name: "6ก", color: "bg-rose-100 border-rose-300 text-rose-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "6ข", color: "bg-fuchsia-100 border-fuchsia-300 text-fuchsia-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "19B", color: "bg-blue-100 border-blue-300 text-blue-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "20B", color: "bg-cyan-100 border-cyan-300 text-cyan-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "21B", color: "bg-teal-100 border-teal-300 text-teal-900", beds: [], isDefault: true, hasGender: true, lastUpdated: "" },
            { id: generateId(), name: "Observe ward", color: "bg-indigo-100 border-indigo-300 text-indigo-900", beds: [], isDefault: true, hasGender: true, lastUpdated: "" },
            { id: generateId(), name: "ICU", color: "bg-red-100 border-red-300 text-red-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "RCU", color: "bg-orange-100 border-orange-300 text-orange-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "Semi ICU", color: "bg-amber-100 border-amber-300 text-amber-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "PUI", color: "bg-yellow-100 border-yellow-300 text-yellow-900", beds: [], isDefault: true, lastUpdated: "" },
            { id: generateId(), name: "Cohort", color: "bg-emerald-100 border-emerald-300 text-emerald-900", beds: [], isDefault: true, lastUpdated: "" }
        ];

        let appData = [];
        let sortableInstances = [];
        let historyLog = []; 
        let currentCaptchaCode = ""; 
        let isInteracting = false; 
        let isSaving = false;
        let hasPendingChanges = false; 
        let syncBlockUntil = 0; 
        let saveTimeout; 
        let currentFilter = 'All'; 

        function getApiUrl() { return HARDCODED_API_URL.trim() !== "" ? HARDCODED_API_URL.trim() : document.getElementById('api-url').value; }

        function cycleState(currentState) {
            if (currentState === 'reserved') return 'vacant';
            if (currentState === 'vacant') return 'discharge';
            return 'reserved';
        }

        function updateWardTimestamp(wardId) {
            const ward = appData.find(w => w.id === wardId);
            if (ward) {
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-GB', { timeZone: 'Asia/Bangkok', day: '2-digit', month: '2-digit', year: '2-digit' });
                const timeStr = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                ward.lastUpdated = `${dateStr} ${timeStr}`;
            }
        }

        // UPDATED: Semi ICU is now part of Covid Building
        function getWardCategory(name) {
            if (!name) return "Other";
            const n = name.toLowerCase();
            if (n.includes('19b') || n.includes('20b') || n.includes('21b') || n.includes('icu')) {
                if (n.includes('semi')) return "ตึก COVID"; // Check Semi first
                return "ตึกทศมินทร์";
            }
            if (n.includes('6ก') || n.includes('6ข') || n.includes('observe') || n.includes('er')) return "ตึกนอก";
            if (n.includes('rcu') || n.includes('pui') || n.includes('cohort') || n.includes('semi')) return "ตึก COVID";
            return "Other";
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.id === 'filter-' + filter) {
                    btn.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'scale-105');
                    btn.classList.remove('bg-white/70', 'text-gray-600');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'scale-105');
                    btn.classList.add('bg-white/70', 'text-gray-600');
                }
            });
            renderDashboard();
        }

        function updateSummaryBoard() {
            const summaryWrapper = document.getElementById('summary-board-wrapper');
            const summaryContent = document.getElementById('summary-content');
            let htmlContent = '';
            let observeHtmlContent = '';
            let plainTextToCopy = '';
            let observePlainText = '';
            let hasValidData = false;

            appData.forEach(ward => {
                const wName = (ward.name || "").toLowerCase();
                const isObserve = wName.includes("observe");
                const isGendered = wName.includes("observe") || wName.includes("21b");

                let v = 0, vm = 0, vf = 0, r = 0, d = 0;
                if (ward.beds && ward.beds.length > 0) {
                    ward.beds.forEach(bed => {
                        if (bed.state === 'vacant') { v++; if (isGendered) { if (bed.gender === 'female') vf++; else vm++; } }
                        else if (bed.state === 'reserved') r++;
                        else if (bed.state === 'discharge') d++;
                    });
                }

                let displayName = ward.name;
                if (wName.includes("semi")) displayName = "Semi";
                if (wName.includes("cohort")) displayName = "Cohort";
                if (wName.includes("observe")) displayName = "Observe";

                let chips = [];
                let pParts = [displayName];

                if (v === 0) {
                    chips.push(`<span class="bg-red-500 text-white font-black px-3 py-1 rounded text-sm uppercase">เต็ม</span>`);
                    pParts.push(`เต็ม`);
                } else {
                    let vt = isGendered ? (vm > 0 && vf > 0 ? `ว่าง ช ${vm}, ญ ${vf}` : (vm > 0 ? `ว่าง ช ${vm}` : `ว่าง ญ ${vf}`)) : `ว่าง ${v}`;
                    chips.push(`<span class="bg-emerald-100 text-emerald-800 font-bold px-3 py-1 rounded text-sm border border-emerald-200">${vt}</span>`);
                    pParts.push(vt);
                }

                if (r > 0) { chips.push(`<span class="bg-rose-100 text-rose-800 font-bold px-3 py-1 rounded text-sm border border-rose-200">จองมาแล้ว ${r}</span>`); pParts.push(`จองมาแล้ว ${r}`); }
                if (d > 0) { chips.push(`<span class="bg-sky-100 text-sky-800 font-bold px-3 py-1 rounded text-sm border border-sky-200">Plan D/C ${d}</span>`); pParts.push(`Plan D/C ${d}`); }

                let row = `<div class="flex items-center gap-4 py-2.5 border-b border-gray-100 last:border-0 overflow-hidden"><span class="font-black w-24 text-gray-800 flex-shrink-0 truncate uppercase text-xl">${displayName}</span><div class="flex gap-2.5 flex-wrap">${chips.join('')}</div></div>`;
                let p = pParts.join(' ') + '\n';

                if (isObserve) { observeHtmlContent += row; observePlainText += p; }
                else { htmlContent += row; plainTextToCopy += p; }
                hasValidData = true;
            });

            if (hasValidData) {
                summaryContent.innerHTML = htmlContent + observeHtmlContent;
                summaryWrapper.classList.remove('hidden');
                document.getElementById('copy-summary-btn').onclick = () => {
                    const el = document.createElement('textarea'); el.value = (plainTextToCopy + observePlainText).trim();
                    document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                    const b = document.getElementById('copy-summary-btn'); b.innerHTML = '<i class="ph-bold ph-check text-emerald-500 text-3xl"></i>';
                    setTimeout(() => { b.innerHTML = '<i class="ph-bold ph-copy text-2xl"></i>'; }, 2000);
                };
            } else summaryWrapper.classList.add('hidden');
        }

        function renderDashboard() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = ''; sortableInstances.forEach(i => i.destroy()); sortableInstances = [];
            if (!appData || appData.length === 0) return;

            appData.forEach(ward => {
                if (currentFilter !== 'All') {
                    const cat = getWardCategory(ward.name);
                    if (cat !== currentFilter) return;
                }

                const wardDiv = document.createElement('div');
                wardDiv.className = `bg-white/70 backdrop-blur-xl rounded-3xl shadow-sm border border-white/80 overflow-hidden mb-2 ward-hover`;
                wardDiv.dataset.wardId = ward.id;
                
                const header = document.createElement('div');
                header.className = `${ward.color} bg-opacity-80 px-6 py-4 flex justify-between items-center border-b border-white/50`;
                
                const left = document.createElement('div'); left.className = "flex flex-col";
                const title = document.createElement('div'); title.className = "font-black text-2xl outline-none italic uppercase";
                title.contentEditable = "true"; title.innerText = ward.name;
                title.onblur = (e) => { if(ward.name !== e.target.innerText) { updateWardTimestamp(ward.id); updateWardName(ward.id, e.target.innerText); } };
                
                const stamp = document.createElement('div'); stamp.className = "text-[10px] font-black uppercase opacity-50 -mt-1 truncate";
                stamp.innerText = ward.lastUpdated ? `Update: ${ward.lastUpdated}` : "NEW";

                left.appendChild(title); left.appendChild(stamp);
                const right = document.createElement('div'); right.className = "flex items-center gap-3";
                const refBtn = document.createElement('button'); refBtn.className = "opacity-40 hover:opacity-100 transition-all hover:rotate-180 hover:text-blue-600";
                refBtn.innerHTML = '<i class="ph-bold ph-arrows-clockwise text-2xl"></i>';
                refBtn.onclick = (e) => { e.stopPropagation(); forceUpdateWardTime(ward.id); };

                if (!ward.isDefault) {
                    const del = document.createElement('button'); del.className = "opacity-40 hover:opacity-100 hover:text-red-600";
                    del.innerHTML = '<i class="ph-fill ph-trash text-2xl"></i>';
                    del.onclick = (e) => { e.stopPropagation(); deleteWard(ward.id); };
                    right.appendChild(del);
                }
                right.prepend(refBtn); header.appendChild(left); header.appendChild(right); wardDiv.appendChild(header);

                const grid = document.createElement('div'); grid.className = "p-4 grid grid-cols-2 gap-4 min-h-[70px] ward-bed-list";
                grid.dataset.wardId = ward.id;

                if (ward.beds && ward.beds.length > 0) { ward.beds.forEach(bed => { grid.appendChild(createBedElement(ward, bed)); }); }
                else { grid.innerHTML = `<div class="col-span-full h-[100px] flex items-center justify-center text-red-500 font-black text-3xl uppercase tracking-widest opacity-20">Full</div>`; }

                wardDiv.appendChild(grid);
                const foot = document.createElement('div'); foot.className = "px-6 py-3 border-t border-white/20 flex justify-end";
                foot.innerHTML = `<button onclick="addBed('${ward.id}')" class="text-[13px] font-black text-blue-600 uppercase tracking-widest hover:scale-110 transition-transform">+ ADD BED</button>`;
                wardDiv.appendChild(foot); container.appendChild(wardDiv);
            });

            document.querySelectorAll('.ward-bed-list').forEach(list => {
                sortableInstances.push(new Sortable(list, {
                    group: 'shared-beds', animation: 120, ghostClass: 'sortable-ghost',
                    onStart: () => { isInteracting = true; }, onEnd: (evt) => { isInteracting = false; handleDragEnd(evt); }
                }));
            });
            updateSummaryBoard();
        }

        function createBedElement(ward, bed) {
            const div = document.createElement('div');
            div.className = `bed-box state-${bed.state} rounded-2xl p-0 cursor-grab relative shadow-sm block`;
            div.dataset.bedId = bed.id;
            
            let isLong = false, timer, sx, sy;
            const start = (e) => {
                if (e.target.closest('button')) return; 
                const touch = e.touches ? e.touches[0] : e;
                sx = touch.clientX; sy = touch.clientY; isLong = false;
                timer = setTimeout(() => { isLong = true; if (navigator.vibrate) navigator.vibrate(20); openTransferModal(bed.id, ward.id); }, 400); 
            };
            const cancel = () => clearTimeout(timer);
            const move = (e) => { const touch = e.touches ? e.touches[0] : e; if (Math.abs(touch.clientX - sx) > 5 || Math.abs(touch.clientY - sy) > 5) cancel(); };

            div.addEventListener('touchstart', start, {passive: true}); div.addEventListener('touchend', cancel); div.addEventListener('touchmove', move, {passive: true});
            div.addEventListener('mousedown', start); div.addEventListener('mouseup', cancel); div.addEventListener('mousemove', move);

            const txt = document.createElement('div'); txt.className = "text-input font-black leading-tight cursor-text";
            txt.contentEditable = "false"; txt.innerText = bed.text || "";
            txt.onclick = (e) => { if (isLong) { e.preventDefault(); return; } if (txt.contentEditable !== "true") { txt.contentEditable = "true"; txt.focus(); } };
            txt.onfocus = () => { isInteracting = true; };
            txt.onblur = (e) => { txt.contentEditable = "false"; isInteracting = false; if (bed.text !== e.target.innerText) { updateWardTimestamp(ward.id); updateBedText(bed.id, e.target.innerText); } };

            const colorBtn = document.createElement('button'); colorBtn.className = "color-btn absolute top-1 right-1 text-2xl hover:scale-125 drop-shadow-md";
            colorBtn.innerHTML = '<i class="ph-fill ph-drop"></i>';
            colorBtn.onclick = (e) => { e.stopPropagation(); updateWardTimestamp(ward.id); toggleBedState(bed.id); };

            const trBtn = document.createElement('button'); trBtn.className = "absolute bottom-1 right-8 text-base opacity-20 hover:opacity-100 p-0.5";
            trBtn.innerHTML = '<i class="ph ph-arrows-left-right"></i>';
            trBtn.onclick = (e) => { e.stopPropagation(); openTransferModal(bed.id, ward.id); };

            if (ward.hasGender) {
                const g = document.createElement('button'); g.className = "absolute bottom-1 left-1.5 hover:scale-125";
                g.innerHTML = bed.gender === 'female' ? '<i class="ph-bold ph-gender-female text-pink-600 text-3xl"></i>' : '<i class="ph-bold ph-gender-male text-blue-600 text-3xl"></i>';
                g.onclick = (e) => { e.stopPropagation(); updateWardTimestamp(ward.id); toggleBedGender(bed.id); };
                div.appendChild(g);
            }

            const del = document.createElement('button'); del.className = "absolute bottom-1 right-1 text-base opacity-20 hover:opacity-100 p-0.5";
            del.innerHTML = '<i class="ph ph-trash"></i>';
            del.onclick = (e) => { e.stopPropagation(); updateWardTimestamp(ward.id); deleteBed(bed.id); };

            div.appendChild(txt); div.appendChild(colorBtn); div.appendChild(trBtn); div.appendChild(del); return div;
        }

        // Packaging
        function extractHistoryAndData(raw) {
            let data = [], history = [];
            if (Array.isArray(raw)) data = [...raw]; 
            else if (raw && raw.data) { data = [...raw.data]; history = raw.history || []; }
            const hIdx = data.findIndex(w => w.id === "SYSTEM_HISTORY");
            if (hIdx !== -1) { history = data[hIdx].log || []; data.splice(hIdx, 1); }
            return { data: applyDefaultFlags(data), history: history };
        }

        function getPayloadForSaving() {
            if (historyLog.length > 100) historyLog = historyLog.slice(0, 100);
            const p = [...appData]; p.push({ id: "SYSTEM_HISTORY", log: historyLog, beds: [] });
            return p;
        }

        function saveToHistory(action) {
            const state = JSON.stringify(appData);
            if (historyLog.length === 0 || historyLog[0].data !== state) {
                const now = new Date();
                const t = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const d = now.toLocaleDateString('en-GB', { timeZone: 'Asia/Bangkok', day: '2-digit', month: '2-digit', year: 'numeric' });
                historyLog.unshift({ time: t, dateStr: `${d}, ${t}`, action: action, data: state });
                if (historyLog.length > 100) historyLog = historyLog.slice(0, 100);
            }
        }

        // Modals
        function openHistoryModal() {
            const l = document.getElementById('history-list'); l.innerHTML = '';
            if (historyLog.length === 0) { l.innerHTML = `<div class="text-center text-gray-400 p-10 font-bold">No history available</div>`; }
            else { historyLog.forEach((entry, i) => {
                const btn = document.createElement('button'); btn.className = `w-full text-left px-5 py-4 rounded-2xl border bg-gray-50 hover:bg-blue-50 mb-2 flex items-center justify-between group`;
                btn.innerHTML = `<div class="flex items-center gap-4"><i class="ph-bold ph-clock text-gray-400 group-hover:text-blue-500 text-3xl"></i><div class="flex flex-col"><span class="font-black text-gray-700 text-base">${entry.dateStr || entry.time}</span><span class="text-sm font-bold text-gray-500 mt-1">${entry.action}</span></div></div><span class="text-[10px] font-black text-blue-500 opacity-0 group-hover:opacity-100 uppercase">Restore</span>`;
                btn.onclick = () => rollbackTo(i); l.appendChild(btn);
            }); }
            const m = document.getElementById('history-modal'); m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => m.classList.add('opacity-100'), 10);
        }
        function closeHistoryModal() { const m = document.getElementById('history-modal'); m.classList.remove('opacity-100'); setTimeout(() => m.classList.add('hidden'), 300); }

        function openCaptchaModal() {
            if (historyLog.length === 0) return;
            currentCaptchaCode = Array.from({length:4}, () => '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random()*36)]).join('');
            document.getElementById('captcha-code-display').innerText = currentCaptchaCode;
            document.getElementById('captcha-input').value = '';
            const m = document.getElementById('captcha-modal'); m.classList.remove('hidden'); m.classList.add('flex');
        }
        function closeCaptchaModal() { document.getElementById('captcha-modal').classList.add('hidden'); }
        function verifyCaptchaAndClear() {
            if (document.getElementById('captcha-input').value.toUpperCase() === currentCaptchaCode) {
                historyLog = []; saveToHistory("History Cleared"); autoSave("History Cleared");
                closeCaptchaModal(); openHistoryModal(); 
            } else openCaptchaModal();
        }

        function openAddWardModal() { document.getElementById('new-ward-name').value = ''; const m = document.getElementById('add-ward-modal'); m.classList.remove('hidden'); m.classList.add('flex'); }
        function closeAddWardModal() { document.getElementById('add-ward-modal').classList.add('hidden'); }
        function confirmAddWard() {
            const n = document.getElementById('new-ward-name').value.trim().toUpperCase(); if (!n) return;
            const c = ["bg-rose-100 border-rose-300 text-rose-900", "bg-sky-100 border-sky-300 text-sky-900", "bg-emerald-100 border-emerald-300 text-emerald-900"];
            appData.push({ id: generateId(), name: n, color: c[Math.floor(Math.random()*3)], beds: [], isDefault: false, lastUpdated: "" });
            renderDashboard(); autoSave(`Created ward ${n}`); closeAddWardModal();
        }

        function rollbackTo(idx) {
            const t = historyLog[idx].dateStr || historyLog[idx].time;
            if(confirm(`Restore state at ${t}?`)) { appData = JSON.parse(historyLog[idx].data); renderDashboard(); autoSave(`Restored to ${t}`); closeHistoryModal(); }
        }

        // Transfers
        let tBed = null, tFrom = null, tTarget = null;
        function openTransferModal(b, f) { tBed = b; tFrom = f; renderTList(); const m = document.getElementById('transfer-modal'); m.classList.remove('hidden'); m.classList.add('flex'); }
        function closeTransferModal() { document.getElementById('transfer-modal').classList.add('hidden'); }
        function renderTList() {
            const l = document.getElementById('transfer-ward-list'); l.innerHTML = '';
            appData.forEach(w => {
                if (w.id === tFrom) return;
                const vac = w.beds.filter(b => b.state === 'vacant').length;
                const btn = document.createElement('button'); btn.className = `w-full text-left px-5 py-4 rounded-2xl border bg-gray-50 hover:bg-blue-50 flex items-center justify-between group ${vac === 0 ? 'opacity-40 grayscale pointer-events-none' : ''}`;
                btn.innerHTML = `<div><span class="font-black text-gray-700 italic text-xl uppercase">${w.name}</span><span class="ml-3 text-[10px] bg-emerald-500 text-white px-2 py-1 rounded uppercase">${vac} Vacant</span></div><i class="ph-bold ph-caret-right text-gray-300"></i>`;
                if(vac > 0) btn.onclick = () => showTDetails(w.id); l.appendChild(btn);
            });
        }
        function showTDetails(target) {
            tTarget = target; const w = appData.find(x => x.id === target);
            const l = document.getElementById('transfer-ward-list'); l.innerHTML = '';
            document.getElementById('transfer-modal-title').innerHTML = `<button onclick="renderTList()"><i class="ph-bold ph-arrow-left"></i></button> Select Bed`;
            w.beds.forEach(b => {
                if (b.state === 'vacant') {
                    const btn = document.createElement('button'); btn.className = `w-full text-left px-5 py-4 rounded-2xl border border-emerald-100 bg-emerald-50 mb-2 flex items-center justify-between`;
                    btn.innerHTML = `<span class="font-black text-emerald-800 text-lg italic uppercase">${b.text || 'Vacant Bed'}</span><i class="ph-bold ph-check text-emerald-600 opacity-0 group-hover:opacity-100 text-3xl"></i>`;
                    btn.onclick = () => {
                        const sB = appData.find(x => x.id === tFrom).beds.find(x => x.id === tBed);
                        b.text = sB.text; b.state = sB.state; b.gender = w.hasGender ? (sB.gender || 'male') : undefined;
                        sB.text = ""; sB.state = "vacant"; sB.gender = appData.find(x => x.id === tFrom).hasGender ? 'male' : undefined;
                        updateWardTimestamp(tFrom); updateWardTimestamp(tTarget); renderDashboard(); autoSave(`Transferred to ${w.name}`); closeTransferModal();
                    };
                    l.appendChild(btn);
                }
            });
        }

        // Operations
        function forceUpdateWardTime(id) { updateWardTimestamp(id); renderDashboard(); autoSave(`Updated time for ${appData.find(x => x.id === id).name}`); }
        function toggleBedState(id) { const i = findBed(id); i.bed.state = cycleState(i.bed.state); renderDashboard(); autoSave(`State ${i.bed.state} in ${i.ward.name}`); }
        function toggleBedGender(id) { const i = findBed(id); i.bed.gender = i.bed.gender === 'female' ? 'male' : 'female'; renderDashboard(); autoSave(`Gender ${i.bed.gender} in ${i.ward.name}`); }
        function updateBedText(id, t) { const i = findBed(id); if(i) { i.bed.text = t; autoSave(`Edited ${i.ward.name}`); } }
        function updateWardName(id, n) { const w = appData.find(x => x.id === id); if(w) { w.name = n; renderDashboard(); autoSave(`Renamed ${n}`); } }
        function addBed(id) { const w = appData.find(x => x.id === id); if(!w.beds) w.beds = []; w.beds.push({ id: generateId(), text: "", state: "vacant", gender: w.hasGender ? "male" : undefined }); updateWardTimestamp(id); renderDashboard(); autoSave(`New Bed in ${w.name}`); }
        function deleteBed(id) { const i = findBed(id); i.ward.beds.splice(i.idx, 1); updateWardTimestamp(i.ward.id); renderDashboard(); autoSave(`Removed Bed in ${i.ward.name}`); }
        function deleteWard(id) { const w = appData.find(x => x.id === id); if(confirm(`Delete ${w.name}?`)) { appData = appData.filter(x => x.id !== id); renderDashboard(); autoSave(`Deleted ${w.name}`); } }
        function findBed(id) { for(let w of appData) { let i = w.beds.findIndex(b => b.id === id); if(i !== -1) return { ward: w, bed: w.beds[i], idx: i }; } return null; }
        function handleDragEnd(evt) {
            const fW = appData.find(w => w.id === evt.from.dataset.wardId), tW = appData.find(w => w.id === evt.to.dataset.wardId);
            if (fW && tW) {
                const [moved] = fW.beds.splice(evt.oldIndex, 1);
                if (tW.hasGender && !moved.gender) moved.gender = 'male';
                tW.beds.splice(evt.newIndex, 0, moved);
                updateWardTimestamp(fW.id); updateWardTimestamp(tW.id); renderDashboard();
                autoSave(fW.id === tW.id ? `Reordered ${fW.name}` : `Moved ${fW.name} to ${tW.name}`);
            }
        }

        // Persistence
        function updateClock() {
            const n = new Date();
            const d = n.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const t = n.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if(document.getElementById('current-date')) document.getElementById('current-date').innerText = d;
            if(document.getElementById('current-time')) document.getElementById('current-time').innerText = t;
        }
        setInterval(updateClock, 1000);

        function applyDefaultFlags(data) {
            const originals = ["6ก", "6ข", "19B", "20B", "21B", "Observe ward", "ICU", "RCU", "Semi ICU", "PUI", "Cohort"];
            data.forEach(w => {
                if (w.isDefault === undefined && originals.some(o => (w.name||"").toLowerCase().includes(o.toLowerCase()))) w.isDefault = true;
                const n = (w.name || "").toLowerCase();
                if (n.includes("observe") || n.includes("21b")) w.hasGender = true;
                if (!w.beds) w.beds = [];
            });
            return data;
        }

        function autoSave(desc = "Auto Saved") {
            hasPendingChanges = true; const url = getApiUrl();
            saveToHistory(desc);
            const payload = getPayloadForSaving();
            localStorage.setItem('er_dashboard_data', JSON.stringify(payload));
            if (!url) return;
            clearTimeout(saveTimeout);
            document.getElementById('sync-status').innerText = "SAVING...";
            saveTimeout = setTimeout(() => saveToCloud(url, payload), 1500); 
        }

        async function saveToCloud(url, payload) {
            isSaving = true;
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                if (res.ok) { document.getElementById('sync-status').innerHTML = 'SYNCED'; syncBlockUntil = Date.now() + 8000; }
            } catch (e) {} finally { isSaving = false; hasPendingChanges = false; }
        }

        async function backgroundSync() {
            const url = getApiUrl();
            if (!url || isInteracting || isSaving || hasPendingChanges || Date.now() < syncBlockUntil) return;
            try {
                const res = await fetch(url); const raw = await res.json();
                if (isInteracting || isSaving || hasPendingChanges) return; 
                const ext = extractHistoryAndData(raw);
                if (JSON.stringify(ext.data) !== JSON.stringify(appData)) { appData = ext.data; historyLog = ext.history; renderDashboard(); }
            } catch (e) {}
        }
        setInterval(backgroundSync, 5000);

        async function syncData() {
            const url = getApiUrl(); if (!url) return;
            try {
                const res = await fetch(url); const raw = await res.json();
                const ext = extractHistoryAndData(raw);
                if (ext.data && ext.data.length > 0) { appData = ext.data; historyLog = ext.history; }
                else { appData = JSON.parse(JSON.stringify(defaultWards)); }
                renderDashboard();
            } catch (e) { loadLocal(); }
        }

        function loadLocal() {
            const local = localStorage.getItem('er_dashboard_data');
            if (local) { const ext = extractHistoryAndData(JSON.parse(local)); appData = ext.data; historyLog = ext.history; }
            else appData = JSON.parse(JSON.stringify(defaultWards));
            renderDashboard();
        }

        window.onload = () => {
            updateClock();
            const sel = document.getElementById('font-selector'), f = localStorage.getItem('er_dashboard_font');
            if (f) { document.body.style.fontFamily = f; if(sel) sel.value = f; }
            if (sel) sel.onchange = (e) => { document.body.style.fontFamily = e.target.value; localStorage.setItem('er_dashboard_font', e.target.value); };
            if (HARDCODED_API_URL.trim() !== "") { if(document.getElementById('url-input-container')) document.getElementById('url-input-container').style.display='none'; syncData(); }
            else { if(document.getElementById('url-input-container')) document.getElementById('url-input-container').classList.remove('hidden'); loadLocal(); }
        };
    </script>
</body>
</html>

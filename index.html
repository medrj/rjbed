<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ Med Bed Manager</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SortableJS for mobile-friendly drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Soft pastel gradient background */
            background: linear-gradient(135deg, #fce7f3 0%, #e0f2fe 50%, #dcfce7 100%);
            min-height: 100vh;
        }
        
        /* Smooth transitions & Glassmorphism base for beds */
        .bed-box { 
            transition: all 0.3s ease; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.04); 
        }
        .bed-box:hover { 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.12), 0 4px 6px -2px rgba(0, 0, 0, 0.06); 
            transform: translateY(-2px); 
        }
        
        /* State Colors - Vibrant Light Pastel Glass Theme */
        
        /* Reserved: Pastel Red */
        .state-reserved { 
            background-color: rgba(248, 113, 113, 0.85); /* red-400 */
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
        }
        .state-reserved .text-input { color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .state-reserved .color-btn { color: #fee2e2; }
        .state-reserved .color-btn:hover { color: #ffffff; }
        
        /* Vacant: Pastel Green */
        .state-vacant { 
            background-color: rgba(134, 239, 172, 0.85); /* green-300 */
            color: #064e3b; /* dark green text for readability */
            border: 1px solid rgba(255, 255, 255, 0.6); 
        }
        .state-vacant .text-input { color: #064e3b; }
        .state-vacant .color-btn { color: #166534; }
        .state-vacant .color-btn:hover { color: #064e3b; }
        
        /* Plan D/C: Vibrant Pastel Sky Blue */
        .state-discharge { 
            background-color: rgba(56, 189, 248, 0.85); /* sky-400 */
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
        }
        .state-discharge .text-input { color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .state-discharge .color-btn { color: #e0f2fe; }
        .state-discharge .color-btn:hover { color: #ffffff; }

        /* Textbox styling */
        .text-input {
            min-height: 5.5rem; /* Taller box by default */
            width: 100%;
            border: 2px dashed transparent; 
            border-radius: 8px;
            /* Padding: Top(8px), Right(48px for big drop icon), Bottom(36px for gender/trash), Left(8px) */
            padding: 8px 48px 36px 8px; 
            opacity: 0.95;
            transition: all 0.2s ease;
            word-break: break-word; /* Wrap long patient names naturally */
        }
        
        /* Show border if empty */
        .text-input:empty {
            border-color: currentColor;
            opacity: 0.6;
        }
        
        .text-input:hover, .text-input:focus {
            opacity: 1;
            border-style: solid;
            border-color: currentColor;
            outline: none;
            background-color: rgba(255, 255, 255, 0.25);
        }
        
        /* Dragging visual feedback */
        .sortable-ghost { opacity: 0.4; }
        .sortable-drag { cursor: grabbing !important; }

        /* Pop-in animation for instant feedback */
        @keyframes popIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .bed-box {
            animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="p-3 md:p-6 lg:p-8">

    <!-- 95% Screen Width Wrapper for Landscape Optimization -->
    <div class="w-[95%] mx-auto">
        <!-- Header & Settings -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-2 drop-shadow-sm">
                    <i class="ph-fill ph-hospital text-blue-600"></i>
                    RJ Med Bed Manager
                </h1>
                <p class="text-gray-600 mt-1">Drag and drop to move patients. Click the paint icon to change status.</p>
                
                <!-- Color Legend (Larger Blocks & Fonts) -->
                <div class="flex flex-wrap gap-6 mt-4 mb-3">
                    <span class="flex items-center gap-2.5 text-base md:text-lg font-semibold text-gray-800"><span class="w-10 h-6 rounded-md bg-red-400 border border-red-500 shadow-sm"></span> Reserved</span>
                    <span class="flex items-center gap-2.5 text-base md:text-lg font-semibold text-gray-800"><span class="w-10 h-6 rounded-md bg-green-300 border border-green-500 shadow-sm"></span> Vacant</span>
                    <span class="flex items-center gap-2.5 text-base md:text-lg font-semibold text-gray-800"><span class="w-10 h-6 rounded-md bg-sky-400 border border-sky-500 shadow-sm"></span> Plan D/C</span>
                </div>
            </div>
            
            <div id="settings-panel" class="bg-white/70 backdrop-blur-md p-4 rounded-xl shadow-md border border-white/80 flex flex-col gap-3 w-full md:w-[22rem]">
                <div id="url-input-container">
                    <label class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Database Link (Google Apps Script URL)</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="api-url" placeholder="Paste Web App URL here..." class="flex-1 text-sm border border-gray-300 rounded px-2 py-1 focus:outline-none focus:border-blue-500 bg-white/90">
                        <button onclick="syncData()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 flex items-center gap-1 transition-colors shadow-sm">
                            <i class="ph ph-arrows-clockwise"></i> Sync
                        </button>
                    </div>
                </div>
                
                <!-- Futuristic Date & Time -->
                <div class="flex flex-col items-end justify-center border-b border-gray-200/60 pb-3 mb-1 w-full">
                    <div id="current-time" class="text-4xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-blue-600 via-sky-500 to-cyan-500 font-mono drop-shadow-sm" style="font-variant-numeric: tabular-nums;">
                        --:--:--
                    </div>
                    <div id="current-date" class="text-xs font-bold text-gray-500 tracking-[0.25em] uppercase mt-1">
                        ---
                    </div>
                </div>
                
                <!-- Live Sync Status -->
                <div class="flex flex-col gap-1.5">
                    <div class="flex justify-between items-center pt-0.5" id="status-container">
                        <div class="flex items-center gap-2">
                            <span class="relative flex h-2.5 w-2.5">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                            </span>
                            <div id="last-update" class="text-xs text-gray-600 font-medium text-emerald-700">Live Sync Active</div>
                        </div>
                        <div id="sync-status" class="text-xs text-gray-500 text-right h-4">Connected</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Container (2-Column Grid on Large Screens) -->
        <div id="dashboard-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
            <!-- Wards will be injected here via JavaScript -->
        </div>

        <!-- Add Ward Button -->
        <button onclick="addWard()" class="mt-8 w-full py-4 border-2 border-dashed border-gray-400 bg-white/40 backdrop-blur-sm rounded-2xl text-gray-600 font-semibold hover:bg-white/60 hover:text-gray-800 transition-colors flex items-center justify-center gap-2 shadow-sm">
            <i class="ph ph-plus-circle text-xl"></i> Add New Ward
        </button>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        // Paste your Google Apps Script URL below. 
        // If provided, the UI to input the URL will be hidden.
        const HARDCODED_API_URL = "https://script.google.com/macros/s/AKfycbx_nCLnjyOCgV6SyOMV4C_2CDyaq-LBhRVlUECDP0eL5q8JsuuuhDW2gqLKZsl06ZlC/exec"; 

        // Utility: Generate a random ID
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // Initial setup for default wards
        const defaultWards = [
            { id: generateId(), name: "6ก", color: "bg-rose-100 border-rose-300 text-rose-900", beds: [], isDefault: true },
            { id: generateId(), name: "6ข", color: "bg-fuchsia-100 border-fuchsia-300 text-fuchsia-900", beds: [], isDefault: true },
            { id: generateId(), name: "19B", color: "bg-blue-100 border-blue-300 text-blue-900", beds: [], isDefault: true },
            { id: generateId(), name: "20B", color: "bg-cyan-100 border-cyan-300 text-cyan-900", beds: [], isDefault: true },
            { id: generateId(), name: "21B", color: "bg-teal-100 border-teal-300 text-teal-900", beds: [], isDefault: true, hasGender: true },
            { id: generateId(), name: "Observe ward", color: "bg-indigo-100 border-indigo-300 text-indigo-900", beds: [], isDefault: true, hasGender: true },
            { id: generateId(), name: "ICU", color: "bg-red-100 border-red-300 text-red-900", beds: [], isDefault: true },
            { id: generateId(), name: "RCU", color: "bg-orange-100 border-orange-300 text-orange-900", beds: [], isDefault: true },
            { id: generateId(), name: "Semi ICU", color: "bg-amber-100 border-amber-300 text-amber-900", beds: [], isDefault: true },
            { id: generateId(), name: "PUI", color: "bg-yellow-100 border-yellow-300 text-yellow-900", beds: [], isDefault: true },
            { id: generateId(), name: "Cohort", color: "bg-emerald-100 border-emerald-300 text-emerald-900", beds: [], isDefault: true }
        ];

        // The main state of the application
        let appData = [];
        let sortableInstances = [];
        let isInteracting = false; 
        let isSaving = false;
        let hasPendingChanges = false; 
        let syncBlockUntil = 0; 
        let saveTimeout; 

        function getApiUrl() {
            return HARDCODED_API_URL.trim() !== "" ? HARDCODED_API_URL.trim() : document.getElementById('api-url').value;
        }

        // Utility: Cycle colors (Reserved -> Vacant -> Discharge)
        function cycleState(currentState) {
            if (currentState === 'reserved') return 'vacant';
            if (currentState === 'vacant') return 'discharge';
            return 'reserved';
        }

        function restoreDefaults() {
            if(confirm("This will replace your current layout with the standard default wards. Continue?")) {
                appData = JSON.parse(JSON.stringify(defaultWards));
                renderDashboard();
                autoSave();
            }
        }

        // Render the entire dashboard
        function renderDashboard() {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = '';
            
            // Destroy old sortable instances
            sortableInstances.forEach(inst => inst.destroy());
            sortableInstances = [];

            // Safe-guard
            if (!Array.isArray(appData) || appData.length === 0) {
                container.innerHTML = `
                    <div class="bg-white/60 backdrop-blur-md rounded-2xl p-8 text-center border border-white/80 shadow-sm mt-4 col-span-1 lg:col-span-2">
                        <i class="ph ph-warning-circle text-5xl text-amber-500 mb-3 drop-shadow-sm"></i>
                        <h3 class="text-xl font-bold text-gray-800">No Wards Found</h3>
                        <p class="text-gray-600 text-sm mb-6 mt-1">Your dashboard is currently empty. This can happen if local memory was cleared or corrupted.</p>
                        <button onclick="restoreDefaults()" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg font-medium hover:bg-blue-700 shadow-sm transition-colors flex items-center gap-2 mx-auto">
                            <i class="ph ph-arrows-counter-clockwise"></i> Restore Default Wards
                        </button>
                    </div>
                `;
                return;
            }

            appData.forEach(ward => {
                // Ward Container
                const wardDiv = document.createElement('div');
                wardDiv.className = `bg-white/70 backdrop-blur-xl rounded-2xl shadow-lg border border-white/80 overflow-hidden`;
                wardDiv.dataset.wardId = ward.id;
                
                // Ward Header
                const headerDiv = document.createElement('div');
                headerDiv.className = `${ward.color} bg-opacity-90 backdrop-blur-md px-4 py-3 flex justify-between items-center border-b border-white/50 gap-2`;
                
                // Editable Title
                const titleDiv = document.createElement('div');
                titleDiv.className = "font-bold text-lg outline-none flex-1 drop-shadow-sm";
                titleDiv.contentEditable = "true";
                titleDiv.innerText = ward.name || "Unnamed Ward";
                titleDiv.onfocus = () => isInteracting = true;
                titleDiv.onblur = (e) => {
                    isInteracting = false;
                    updateWardName(ward.id, e.target.innerText);
                };
                headerDiv.appendChild(titleDiv);

                // Delete Button
                if (!ward.isDefault) {
                    const delBtn = document.createElement('button');
                    delBtn.className = "text-current opacity-60 hover:opacity-100 transition-opacity p-1";
                    delBtn.title = "Delete Ward";
                    delBtn.innerHTML = '<i class="ph ph-trash"></i>';
                    delBtn.onclick = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        deleteWard(ward.id);
                    };
                    headerDiv.appendChild(delBtn);
                }
                
                wardDiv.appendChild(headerDiv);

                // Beds Grid Container
                const gridContainer = document.createElement('div');
                // Removed 1 column size across breakpoints to make boxes naturally wider horizontal rectangles
                gridContainer.className = "p-4 grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5 min-h-[100px] ward-bed-list";
                gridContainer.dataset.wardId = ward.id;

                if (Array.isArray(ward.beds)) {
                    ward.beds.forEach(bed => {
                        gridContainer.appendChild(createBedElement(ward, bed)); 
                    });
                }

                wardDiv.appendChild(gridContainer);
                
                // Add Bed Button
                const addBedDiv = document.createElement('div');
                addBedDiv.className = "bg-white/40 backdrop-blur-sm px-4 py-3 border-t border-white/60 flex justify-end";
                addBedDiv.innerHTML = `
                    <button onclick="addBed('${ward.id}')" class="text-sm font-semibold text-blue-700 hover:text-blue-900 flex items-center gap-1">
                        <i class="ph ph-plus"></i> Add Bed
                    </button>
                `;
                wardDiv.appendChild(addBedDiv);

                container.appendChild(wardDiv);
            });

            // Initialize SortableJS
            document.querySelectorAll('.ward-bed-list').forEach(listElement => {
                const sortable = new Sortable(listElement, {
                    group: 'shared-beds', 
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    delay: 100, 
                    delayOnTouchOnly: true,
                    onStart: function () {
                        isInteracting = true; 
                    },
                    onEnd: function (evt) {
                        isInteracting = false;
                        handleDragEnd(evt);
                    }
                });
                sortableInstances.push(sortable);
            });
        }

        // Create a single Bed HTML Element 
        function createBedElement(ward, bed) {
            const bedDiv = document.createElement('div');
            // Using a block layout with relative positioning so text can span freely without flexbox compression
            bedDiv.className = `bed-box state-${bed.state} rounded-xl p-2 cursor-grab relative shadow-sm block`;
            bedDiv.dataset.bedId = bed.id;
            
            // Text Input (Editable ONLY on click to allow dragging the rest of the time)
            const textDiv = document.createElement('div');
            textDiv.className = "text-input text-base md:text-lg font-bold leading-tight cursor-text";
            textDiv.contentEditable = "false"; // Start locked so SortableJS allows drag
            textDiv.innerText = bed.text || "";
            
            // Unlock and focus when clicked
            textDiv.onclick = (e) => {
                if (textDiv.contentEditable !== "true") {
                    textDiv.contentEditable = "true";
                    textDiv.focus();
                    
                    // Move cursor to the end of the text for seamless typing
                    if (textDiv.innerText.length > 0) {
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(textDiv);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                }
            };

            textDiv.onfocus = () => isInteracting = true;
            textDiv.onblur = (e) => {
                textDiv.contentEditable = "false"; // Lock it back so it's draggable again
                isInteracting = false;
                updateBedText(bed.id, e.target.innerText);
            };

            // Color Change Button (Absolute top right, Huge size)
            const colorBtn = document.createElement('button');
            colorBtn.className = "color-btn absolute top-3 right-3 text-4xl hover:scale-110 transition-transform z-10 drop-shadow-md";
            colorBtn.innerHTML = '<i class="ph-fill ph-drop"></i>';
            colorBtn.title = "Change Status";
            colorBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation(); 
                toggleBedState(bed.id);
            };

            // Gender toggle icon (Absolute bottom left, Large size)
            if (ward.hasGender) {
                const genderBtn = document.createElement('button');
                genderBtn.className = "gender-btn absolute bottom-3 left-4 hover:scale-110 transition-transform cursor-pointer z-10";
                
                if (!bed.gender) bed.gender = 'male'; 
                
                if (bed.gender === 'male') {
                    genderBtn.innerHTML = '<i class="ph-bold ph-gender-male text-blue-600 drop-shadow-md text-3xl"></i>';
                    genderBtn.title = "Male (Click to switch)";
                } else {
                    genderBtn.innerHTML = '<i class="ph-bold ph-gender-female text-pink-600 drop-shadow-md text-3xl"></i>';
                    genderBtn.title = "Female (Click to switch)";
                }

                genderBtn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation(); 
                    toggleBedGender(bed.id);
                };
                
                bedDiv.appendChild(genderBtn);
            }

            // Delete Bed Button (Absolute bottom right)
            const deleteBtn = document.createElement('button');
            deleteBtn.className = "absolute bottom-3 right-3 text-xl opacity-50 hover:opacity-100 transition-opacity z-10 p-1";
            deleteBtn.innerHTML = '<i class="ph ph-trash"></i>'; 
            deleteBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                deleteBed(bed.id);
            };

            // Append elements directly
            bedDiv.appendChild(textDiv);
            bedDiv.appendChild(colorBtn);
            bedDiv.appendChild(deleteBtn);
            
            return bedDiv;
        }

        // --- Data Manipulation Functions ---

        function findBedInfo(bedId) {
            if (!Array.isArray(appData)) return null;
            for (let i = 0; i < appData.length; i++) {
                if (!appData[i] || !Array.isArray(appData[i].beds)) continue;
                const bedIndex = appData[i].beds.findIndex(b => b.id === bedId);
                if (bedIndex !== -1) {
                    return { ward: appData[i], bed: appData[i].beds[bedIndex], bedIndex: bedIndex };
                }
            }
            return null;
        }

        function toggleBedState(bedId) {
            const info = findBedInfo(bedId);
            if (!info) return;
            info.bed.state = cycleState(info.bed.state);
            
            // Update DOM directly smoothly
            const bedElement = document.querySelector(`[data-bed-id="${bedId}"]`);
            if (bedElement) {
                bedElement.className = `bed-box state-${info.bed.state} rounded-xl p-2 cursor-grab relative shadow-sm block`;
            }
            
            autoSave();
        }

        function toggleBedGender(bedId) {
            const info = findBedInfo(bedId);
            if (!info) return;
            
            info.bed.gender = (info.bed.gender === 'female') ? 'male' : 'female';
            
            // Update DOM directly smoothly
            const genderBtn = document.querySelector(`[data-bed-id="${bedId}"] .gender-btn`);
            if (genderBtn) {
                if (info.bed.gender === 'male') {
                    genderBtn.innerHTML = '<i class="ph-bold ph-gender-male text-blue-600 drop-shadow-md text-3xl"></i>';
                    genderBtn.title = "Male (Click to switch)";
                } else {
                    genderBtn.innerHTML = '<i class="ph-bold ph-gender-female text-pink-600 drop-shadow-md text-3xl"></i>';
                    genderBtn.title = "Female (Click to switch)";
                }
            }
            
            autoSave();
        }

        function updateBedText(bedId, newText) {
            const info = findBedInfo(bedId);
            if (!info) return;
            if (info.bed.text !== newText) {
                info.bed.text = newText;
                autoSave();
            }
        }

        function updateWardName(wardId, newName) {
            const ward = appData.find(w => w.id === wardId);
            if (ward && ward.name !== newName) {
                ward.name = newName;
                autoSave();
            }
        }

        function addBed(wardId) {
            const ward = appData.find(w => w.id === wardId);
            if (!ward) return;
            if (!Array.isArray(ward.beds)) ward.beds = [];

            let newBed = { id: generateId(), text: "", state: "vacant" };
            
            if (ward.hasGender) {
                newBed.gender = "male"; 
            }

            ward.beds.push(newBed);
            
            // Append smoothly to DOM without interrupting UI
            const gridContainer = document.querySelector(`.ward-bed-list[data-ward-id="${wardId}"]`);
            if (gridContainer) {
                const newBedElement = createBedElement(ward, newBed);
                gridContainer.appendChild(newBedElement);
                
                setTimeout(() => {
                    const textInput = newBedElement.querySelector('.text-input');
                    if (textInput) {
                        textInput.contentEditable = "true"; // Must unlock first
                        textInput.focus();
                    }
                }, 10);
            }
            
            autoSave();
        }

        function deleteBed(bedId) {
            const info = findBedInfo(bedId);
            if (!info) return;
            info.ward.beds.splice(info.bedIndex, 1);
            
            // Remove from DOM smoothly
            const bedElement = document.querySelector(`[data-bed-id="${bedId}"]`);
            if (bedElement) {
                bedElement.remove();
            }
            
            autoSave();
        }

        function addWard() {
            const colors = [
                "bg-slate-100 border-slate-300 text-slate-900",
                "bg-zinc-100 border-zinc-300 text-zinc-900",
                "bg-stone-100 border-stone-300 text-stone-900",
                "bg-sky-100 border-sky-300 text-sky-900",
                "bg-violet-100 border-violet-300 text-violet-900"
            ];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            if (!Array.isArray(appData)) appData = [];

            appData.push({
                id: generateId(),
                name: "New Ward",
                color: randomColor,
                beds: [],
                isDefault: false
            });
            renderDashboard();
            autoSave();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function deleteWard(wardId) {
            const ward = appData.find(w => w.id === wardId);
            if (ward && ward.isDefault) {
                alert("Default wards cannot be removed.");
                return;
            }
            
            if(confirm("Remove this entire ward?")) {
                appData = appData.filter(w => w.id !== wardId);
                renderDashboard();
                autoSave();
            }
        }

        // Clock & Date Functionality
        function updateClock() {
            const now = new Date();
            const dateString = now.toLocaleDateString('en-GB', { 
                timeZone: 'Asia/Bangkok',
                day: '2-digit', month: 'short', year: 'numeric'
            });
            const timeString = now.toLocaleTimeString('en-GB', { 
                timeZone: 'Asia/Bangkok',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            });
            
            const dateEl = document.getElementById('current-date');
            const timeEl = document.getElementById('current-time');
            
            if(dateEl) dateEl.innerText = dateString;
            if(timeEl) timeEl.innerText = timeString;
        }
        setInterval(updateClock, 1000); 

        function setLastUpdateTime() {
            const now = new Date();
            const timeString = now.toLocaleString('en-GB', { 
                timeZone: 'Asia/Bangkok',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            });
            const updateEl = document.getElementById('last-update');
            if (updateEl) updateEl.innerText = 'Last Update: ' + timeString;
        }

        function handleDragEnd(evt) {
            const fromWardId = evt.from.dataset.wardId;
            const toWardId = evt.to.dataset.wardId;
            const oldIndex = evt.oldIndex;
            const newIndex = evt.newIndex;

            const fromWard = appData.find(w => w.id === fromWardId);
            const toWard = appData.find(w => w.id === toWardId);

            if (!fromWard || !toWard || !Array.isArray(fromWard.beds) || !Array.isArray(toWard.beds)) return;

            // Remove bed from old location
            const [movedBed] = fromWard.beds.splice(oldIndex, 1);
            
            // Insert bed into new location
            toWard.beds.splice(newIndex, 0, movedBed);

            // If dragged to a new ward, re-render to update ward-specific UI
            if (fromWardId !== toWardId) {
                renderDashboard();
            }

            autoSave();
        }

        // Helper to safely format data
        function applyDefaultFlags(data) {
            if (!Array.isArray(data)) return [];

            const originalNames = ["6ก", "6ข", "19B", "20B", "21B", "Observe ward", "Observe ward (male)", "Observe ward (female)", "ICU", "RCU", "Semi ICU", "PUI", "Cohort"];
            
            let validData = data.filter(ward => ward && typeof ward === 'object' && ward.id);

            validData.forEach(ward => {
                if (ward.isDefault === undefined && ward.name && originalNames.includes(ward.name)) {
                    ward.isDefault = true;
                }
                
                const wName = (ward.name || "").toLowerCase();
                if (wName.includes("observe") || wName.includes("21b")) {
                    ward.hasGender = true;
                }

                if (!Array.isArray(ward.beds)) ward.beds = [];

                ward.beds.forEach(bed => {
                    if (bed.state === 'occupied') bed.state = 'reserved';
                    if (bed.state === 'transfer') bed.state = 'discharge';

                    if (bed.text && (bed.text.trim().toLowerCase() === 'male' || bed.text.trim().toLowerCase() === 'female')) {
                        bed.gender = bed.text.trim().toLowerCase();
                        bed.text = ""; 
                    }
                });
            });
            return validData;
        }

        function autoSave() {
            hasPendingChanges = true; 
            const urlInput = getApiUrl();
            
            localStorage.setItem('er_dashboard_data', JSON.stringify(appData));
            
            if (urlInput === '') {
                document.getElementById('sync-status').innerText = "Saved locally";
                hasPendingChanges = false;
                return;
            }

            clearTimeout(saveTimeout);
            document.getElementById('sync-status').innerText = "Typing/Editing...";
            
            saveTimeout = setTimeout(() => {
                saveToCloud(urlInput);
            }, 1500); 
        }

        async function saveToCloud(url) {
            hasPendingChanges = false; 
            const statusDiv = document.getElementById('sync-status');
            statusDiv.innerHTML = '<span class="text-blue-600">Syncing changes...</span>';
            isSaving = true; 
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(appData)
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '<span class="text-emerald-600"><i class="ph ph-check-circle"></i> Synced</span>';
                    if (HARDCODED_API_URL.trim() === "") {
                        localStorage.setItem('er_dashboard_url', url); 
                    }
                    setLastUpdateTime();
                    
                    syncBlockUntil = Date.now() + 8000; 
                } else {
                    throw new Error("Network response was not ok");
                }
            } catch (error) {
                console.error("Save error:", error);
                statusDiv.innerHTML = '<span class="text-red-500"><i class="ph ph-warning"></i> Retrying save...</span>';
            } finally {
                isSaving = false;
            }
        }

        async function backgroundSync() {
            const urlInput = getApiUrl();
            
            if (urlInput === '' || isInteracting || isSaving || hasPendingChanges || Date.now() < syncBlockUntil) return;

            try {
                const response = await fetch(urlInput);
                const data = await response.json();
                
                if (isInteracting || isSaving || hasPendingChanges || Date.now() < syncBlockUntil) {
                    return; 
                }

                if (Array.isArray(data) && data.length > 0) {
                    const parsedData = applyDefaultFlags(data);
                    
                    if (JSON.stringify(parsedData) !== JSON.stringify(appData)) {
                        appData = parsedData;
                        renderDashboard();
                        setLastUpdateTime();
                        document.getElementById('sync-status').innerHTML = '<span class="text-emerald-600"><i class="ph ph-arrows-clockwise"></i> Updated from cloud</span>';
                        
                        setTimeout(() => {
                            if (!isInteracting && !isSaving) {
                                document.getElementById('sync-status').innerText = "Connected";
                            }
                        }, 2000);
                    }
                }
            } catch (error) {
                console.warn("Background sync failed:", error);
            }
        }

        setInterval(backgroundSync, 3000);

        async function syncData() {
            const urlInput = getApiUrl();
            const statusDiv = document.getElementById('sync-status');
            
            if (urlInput === '') {
                alert("Please paste your Google Apps Script URL first, or configure the HARDCODED_API_URL in the code.");
                return;
            }

            statusDiv.innerHTML = '<span class="text-blue-600">Downloading data...</span>';
            if (HARDCODED_API_URL.trim() === "") {
                localStorage.setItem('er_dashboard_url', urlInput);
            }

            try {
                const response = await fetch(urlInput);
                const data = await response.json();
                
                if (Array.isArray(data) && data.length > 0) {
                    appData = applyDefaultFlags(data);
                    if (appData.length === 0) appData = JSON.parse(JSON.stringify(defaultWards)); 
                    statusDiv.innerHTML = '<span class="text-emerald-600"><i class="ph ph-check-circle"></i> Sync successful</span>';
                    setLastUpdateTime();
                } else {
                    statusDiv.innerHTML = '<span class="text-amber-600">New DB, uploading defaults...</span>';
                    appData = JSON.parse(JSON.stringify(defaultWards));
                    await saveToCloud(urlInput);
                }
                renderDashboard();
            } catch (error) {
                console.error("Sync error:", error);
                statusDiv.innerHTML = '<span class="text-red-500"><i class="ph ph-warning"></i> Connection failed</span>';
                loadLocalData();
            }
        }

        function loadLocalData() {
            try {
                const localData = localStorage.getItem('er_dashboard_data');
                if (localData) {
                    const parsedData = JSON.parse(localData);
                    
                    if (Array.isArray(parsedData) && parsedData.length > 0) {
                        appData = applyDefaultFlags(parsedData);
                    } else {
                        appData = JSON.parse(JSON.stringify(defaultWards)); 
                    }
                } else {
                    appData = JSON.parse(JSON.stringify(defaultWards)); 
                }
            } catch (error) {
                console.error("Local data corrupted, resetting to defaults", error);
                appData = JSON.parse(JSON.stringify(defaultWards)); 
            }
            renderDashboard();
        }

        window.onload = () => {
            updateClock();
            
            if (HARDCODED_API_URL.trim() !== "") {
                document.getElementById('url-input-container').style.display = 'none';
                syncData(); 
            } else {
                const savedUrl = localStorage.getItem('er_dashboard_url');
                if (savedUrl) {
                    document.getElementById('api-url').value = savedUrl;
                    syncData();
                } else {
                    loadLocalData();
                }
            }
        };

    </script>
</body>
